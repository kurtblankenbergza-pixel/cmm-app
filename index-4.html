<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holy Redeemer CMM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,getDocs,addDoc,doc,updateDoc,deleteDoc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FB={apiKey:"AIzaSyAMZ-4sggqB4X0jj3i7RercY2DjCiIZwcg",authDomain:"holy-redeemer-cmm-calendar.firebaseapp.com",projectId:"holy-redeemer-cmm-calendar",storageBucket:"holy-redeemer-cmm-calendar.firebasestorage.app",messagingSenderId:"397429201163",appId:"1:397429201163:web:5644262892b1939a16ea0e"};
const app=initializeApp(FB);
const db=getFirestore(app);
window._db=db;
window._fb={collection,getDocs,addDoc,doc,updateDoc,deleteDoc,setDoc};
window._dbReady=true;
window.dispatchEvent(new Event('dbready'));
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --b:#7B1230;--b2:#5C0D23;--b3:#3D0818;
  --gold:#C9A96E;--gold2:#E8C98A;
  --bg:#F7F4F1;--bg2:#EEEAE5;--card:#fff;
  --text:#1A1118;--text2:#6B5F68;--text3:#A89EA6;
  --border:#E2D8DC;--border2:#D4C4CA;
  --green:#1E7A4A;--amber:#B8860B;--red:#C0392B;--red-bg:#FAEAEA;
  --todo-bg:#F0F4FF;--todo:#3B5BDB;
  --prog-bg:#FFF7E6;--prog:#D97706;
  --done-bg:#E8F5EE;--done:#1E7A4A;
  --hi:#C0392B;--mid:#D97706;--lo:#1E7A4A;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow2:0 8px 32px rgba(0,0,0,.14);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}

/* ── HEADER ── */
.hdr{background:var(--b3);display:flex;align-items:center;padding:0 20px;height:58px;flex-shrink:0;z-index:100;gap:0}
.logo{display:flex;align-items:center;gap:10px;margin-right:24px;flex-shrink:0}
.logo svg{width:36px;height:36px}
.logo-text{display:flex;flex-direction:column;line-height:1.2}
.logo-name{font-family:'Playfair Display',serif;font-size:15px;color:#F0E6D0;font-weight:500}
.logo-sub{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold)}
.nav-tabs{display:flex;gap:1px;flex:1}
.ntab{background:none;border:none;color:rgba(240,230,208,.5);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:8px 12px;cursor:pointer;border-radius:6px;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.ntab:hover{color:rgba(240,230,208,.85);background:rgba(255,255,255,.07)}
.ntab.active{color:#F0E6D0;background:rgba(255,255,255,.13)}
.ntab .badge{background:var(--gold);color:var(--b3);font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;line-height:1.5}
.hdr-right{margin-left:auto;padding-left:12px}
.add-fab{background:var(--gold);color:var(--b3);border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.add-fab:hover{background:var(--gold2);transform:translateY(-1px)}

/* ── LAYOUT ── */
.app-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.mod-wrap{height:100%;overflow-y:auto;padding:20px}

/* ── CAL TOOLBAR ── */
.cal-toolbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)}
.nav-btn{background:none;border:1px solid var(--border2);color:var(--text);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{border-color:var(--b);color:var(--b)}
.cal-label{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;flex:1;padding:0 6px}
.today-btn{background:none;border:1px solid var(--border2);color:var(--text2);font-size:12px;font-weight:500;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .15s}
.today-btn:hover{border-color:var(--b);color:var(--b)}
.view-sw{display:flex;background:var(--bg2);border-radius:8px;padding:3px;gap:2px}
.vsw{background:none;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .15s}
.vsw.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.cal-body{flex:1;overflow-y:auto;padding:16px 20px}

/* ── AGENDA ── */
.ag-section{margin-bottom:28px}
.ag-month{font-family:'Playfair Display',serif;font-size:21px;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.ag-day{display:flex;gap:16px;margin-bottom:2px}
.ag-date{width:50px;flex-shrink:0;text-align:right}
.ag-date-num{font-size:21px;font-weight:300;color:var(--text2);line-height:1}
.ag-date-day{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500}
.ag-date.today .ag-date-num{color:var(--b);font-weight:600}
.ag-events{flex:1;border-left:2px solid var(--border);padding-left:16px;padding-bottom:16px}
.ag-card{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);display:flex;gap:12px;transition:all .15s}
.ag-card:hover{box-shadow:var(--shadow);border-color:var(--border2);transform:translateX(2px)}
.ag-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px}
.ag-body{flex:1;min-width:0}
.ag-title{font-size:14px;font-weight:600;margin-bottom:4px}
.ag-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ag-tag{font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.ag-place{font-size:12px;color:var(--text3)}
.ag-next{font-size:12px;color:var(--text2);margin-top:7px;padding:6px 9px;background:var(--bg);border-radius:6px;border-left:3px solid #ccc}
.ag-next-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.ag-fr{margin-top:8px}
.ag-fr-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:3px}
.ag-fr-val{color:var(--green);font-weight:600}
.ag-fr-track{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.ag-fr-fill{height:100%;background:linear-gradient(90deg,var(--green),#27AE60);border-radius:2px}
.ag-avs{display:flex;margin-left:auto;flex-shrink:0;align-items:flex-start;padding-top:2px}
.av{width:24px;height:24px;border-radius:50%;background:var(--b);color:var(--gold);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);margin-left:-6px;flex-shrink:0}
.av:first-child{margin-left:0}

/* ── MONTH GRID ── */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden}
.dh{background:var(--card);text-align:center;padding:9px 4px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3)}
.dc{background:var(--card);min-height:100px;padding:7px 5px;cursor:pointer;transition:background .1s;position:relative;vertical-align:top}
.dc:hover{background:#fdfaf8;z-index:2}
.dc:hover .dhp{display:block}
.dc.om{background:#faf8f6;opacity:.6}
.dc.tod{background:#FFF8F8}
.dc.tod .dn{background:var(--b);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.dn{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.ec{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;line-height:1.4}
.ec:hover{opacity:.75}
.more{font-size:10px;color:var(--text3);padding:1px 4px}
.dhp{display:none;position:absolute;top:0;left:105%;width:210px;background:var(--card);border-radius:10px;box-shadow:var(--shadow2);padding:12px;z-index:50;border:1px solid var(--border);pointer-events:none}
.dhp h4{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text)}
.dhp-row{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start}
.dhp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dhp-title{font-size:12px;font-weight:500;line-height:1.3;color:var(--text)}
.dhp-place{font-size:11px;color:var(--text3)}

/* ── WEEK ── */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.wk-col{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.wk-col.tod{border-color:var(--b);border-width:2px}
.wk-head{padding:10px 8px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg)}
.wk-dn{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3)}
.wk-dd{font-size:20px;font-weight:300;color:var(--text);margin-top:2px}
.wk-col.tod .wk-dd{color:var(--b);font-weight:600}
.wk-events{padding:7px;min-height:110px}
.wk-chip{padding:5px 7px;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:11px;font-weight:500;display:block;transition:opacity .12s}
.wk-chip:hover{opacity:.75}
.wk-add{background:none;border:1px dashed var(--border);color:var(--text3);width:100%;padding:4px;border-radius:6px;cursor:pointer;font-size:16px;margin-top:4px;transition:all .15s}
.wk-add:hover{border-color:var(--b);color:var(--b)}

/* ── MEETINGS ── */
.sec-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px}
.mtg-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .15s;display:flex;gap:14px;margin-bottom:8px}
.mtg-card:hover{border-color:var(--b);box-shadow:var(--shadow)}
.mtg-date{width:48px;flex-shrink:0;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
.mtg-day{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:600}
.mtg-num{font-size:22px;font-weight:300;color:var(--text);line-height:1;margin-top:2px}
.mtg-mon{font-size:10px;color:var(--text3);font-weight:500}
.mtg-body{flex:1}
.mtg-title{font-size:15px;font-weight:600;margin-bottom:4px}
.mtg-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:7px}
.mtg-place{font-size:12px;color:var(--text3)}
.mtg-next{background:var(--bg);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text2);border-left:3px solid var(--b)}
.mtg-next-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--b);margin-bottom:2px}
.mtg-avs{display:flex;margin-top:8px}

/* ── FUNDRAISING ── */
.fr-hero{background:linear-gradient(135deg,var(--b3),var(--b));border-radius:16px;padding:24px;margin-bottom:20px;color:#fff}
.fr-hero-lbl{font-size:11px;font-weight:600;opacity:.65;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.fr-hero-total{font-size:44px;font-weight:300;line-height:1;margin-bottom:4px}
.fr-hero-total small{font-size:18px;opacity:.55}
.fr-hero-sub{font-size:13px;opacity:.65;margin-bottom:16px}
.fr-hero-bar{height:8px;background:rgba(255,255,255,.18);border-radius:4px;overflow:hidden}
.fr-hero-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px}
.fr-stats{display:flex;margin-top:16px}
.fr-stat{flex:1;text-align:center}
.fr-stat-val{font-size:20px;font-weight:600;color:var(--gold);line-height:1}
.fr-stat-lbl{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.fr-proj-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px}
.fr-proj{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.fr-proj:hover{border-color:var(--b);box-shadow:var(--shadow)}
.fr-proj-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.fr-proj-icon{width:42px;height:42px;border-radius:10px;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fr-proj-info{flex:1}
.fr-proj-title{font-size:15px;font-weight:600;margin-bottom:2px}
.fr-proj-date{font-size:12px;color:var(--text3)}
.fr-proj-amt{text-align:right}
.fr-proj-raised{font-size:20px;font-weight:700;color:var(--green)}
.fr-proj-target{font-size:11px;color:var(--text3)}
.fr-proj-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:8px}
.fr-proj-fill{height:100%;background:linear-gradient(90deg,var(--green),#27AE60);border-radius:3px}
.fr-proj-foot{display:flex;justify-content:space-between;align-items:center}
.fr-proj-pct{font-size:12px;font-weight:600;color:var(--green)}

/* ── TASKS / KANBAN ── */
.tasks-toolbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)}
.tasks-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:500}
.tasks-filter{display:flex;gap:6px;margin-left:auto}
.tf-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all .15s}
.tf-btn.active{background:var(--b);border-color:var(--b);color:#fff}
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;height:100%;overflow:hidden;padding:16px 20px}
.kb-col{display:flex;flex-direction:column;background:var(--bg2);border-radius:12px;overflow:hidden;min-height:0}
.kb-col-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kb-col-title{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.kb-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.kb-todo .kb-col-title{color:var(--todo)}
.kb-todo .kb-count{background:var(--todo-bg);color:var(--todo)}
.kb-prog .kb-col-title{color:var(--prog)}
.kb-prog .kb-count{background:var(--prog-bg);color:var(--prog)}
.kb-done .kb-col-title{color:var(--done)}
.kb-done .kb-count{background:var(--done-bg);color:var(--done)}
.kb-cards{flex:1;overflow-y:auto;padding:0 10px 10px}
.kb-cards::-webkit-scrollbar{width:3px}
.kb-cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.task-card{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);transition:all .15s;position:relative}
.task-card:hover{box-shadow:var(--shadow);border-color:var(--border2);transform:translateY(-1px)}
.task-card-title{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.4;padding-right:20px}
.task-card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.task-pri{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.pri-high{background:#FDECEA;color:var(--hi)}
.pri-mid{background:#FEF3CD;color:var(--mid)}
.pri-low{background:#E8F5EE;color:var(--lo)}
.task-due{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.task-due.overdue{color:var(--red);font-weight:600}
.task-event-link{font-size:10px;color:var(--b);background:#F8E8ED;padding:2px 7px;border-radius:20px;font-weight:500;margin-top:5px;display:inline-block}
.task-avs{display:flex;position:absolute;top:12px;right:12px}
.task-notes{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.4;border-top:1px solid var(--border);padding-top:5px}
.kb-add-btn{background:none;border:1px dashed var(--border);color:var(--text3);width:100%;padding:8px;border-radius:8px;cursor:pointer;font-size:12px;margin:0 0 6px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.kb-add-btn:hover{border-color:var(--b);color:var(--b)}

/* ── MEN ── */
.mod-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.mod-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:500}
.mod-count{font-size:13px;color:var(--text3);font-family:Inter;margin-left:4px}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);outline:none;width:200px;transition:border .15s}
.search-box:focus{border-color:var(--b)}
.view-toggle{display:flex;background:var(--bg2);border-radius:8px;padding:3px;gap:2px;margin-left:auto}
.vt{background:none;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;color:var(--text3);font-size:14px;transition:all .15s}
.vt.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.bday-strip{background:linear-gradient(135deg,var(--b3),var(--b));border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;gap:12px;overflow-x:auto}
.bday-strip::-webkit-scrollbar{height:0}
.bday-card{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;flex-shrink:0;text-align:center;min-width:88px}
.bday-name{font-size:11px;font-weight:600;color:#F0E6D0;white-space:nowrap}
.bday-dt{font-size:10px;color:var(--gold);margin-top:2px}
.bday-n{font-size:22px;font-weight:300;color:#fff;margin-top:4px;line-height:1}
.bday-nl{font-size:9px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.8px}
.mem-list{display:flex;flex-direction:column;gap:6px}
.mem-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.mem-row:hover{border-color:var(--b);box-shadow:var(--shadow)}
.mem-av{width:40px;height:40px;border-radius:50%;background:var(--b);color:var(--gold);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mem-info{flex:1}
.mem-name{font-size:14px;font-weight:600}
.mem-sub{font-size:12px;color:var(--text3);margin-top:1px}
.mem-age{background:var(--bg2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;color:var(--text2)}
.mem-task-badges{display:flex;gap:4px}
.mem-acts{display:flex;gap:4px}
.mem-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:5px;border-radius:6px;font-size:13px;transition:color .15s}
.mem-btn:hover{color:var(--b)}
.mem-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.mem-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .15s}
.mem-tile:hover{border-color:var(--b);box-shadow:var(--shadow);transform:translateY(-2px)}
.mem-tile-av{width:50px;height:50px;border-radius:50%;background:var(--b);color:var(--gold);font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.mem-tile-name{font-size:13px;font-weight:600;margin-bottom:3px}
.mem-tile-sub{font-size:11px;color:var(--text3)}
.man-task-mini{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:3px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(26,17,24,.55);z-index:200;display:none;backdrop-filter:blur(3px)}
.overlay.on{display:block}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border-radius:16px;width:min(95vw,520px);max-height:88vh;display:none;flex-direction:column;z-index:201;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.modal.on{display:flex}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 22px 14px;border-bottom:1px solid var(--border)}
.modal-hdr h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:500}
.mclose{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s}
.mclose:hover{background:var(--bg2)}
.modal-body{overflow-y:auto;padding:18px 22px;flex:1;display:flex;flex-direction:column;gap:14px}
.frow{display:flex;gap:12px}
.frow .fld{flex:1}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text2)}
.fld input,.fld select,.fld textarea{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;width:100%;transition:border .15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--b);background:var(--card)}
.fld textarea{min-height:65px;resize:vertical;line-height:1.5}
.mpicker{display:flex;flex-wrap:wrap;gap:6px}
.mpick{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 8px;border-radius:20px;background:var(--bg);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;font-size:12px;font-weight:500;user-select:none}
.mpick:hover{border-color:var(--b)}
.mpick.sel{background:var(--b);border-color:var(--b);color:#fff}
.mpick-av{width:20px;height:20px;border-radius:50%;background:var(--b2);color:var(--gold);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mpick.sel .mpick-av{background:rgba(255,255,255,.2);color:#fff}
.chk-row{display:flex;align-items:center;gap:8px}
.chk-row input{width:auto;accent-color:var(--b)}
.chk-row label{font-size:13px;font-weight:500;color:var(--text);text-transform:none;letter-spacing:0;margin:0}
.modal-ftr{display:flex;gap:8px;padding:14px 22px;border-top:1px solid var(--border)}
.btn-del{background:none;color:var(--red);border:1.5px solid var(--red);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-right:auto;transition:all .15s}
.btn-del:hover{background:var(--red-bg)}
.btn-cancel{background:var(--bg);color:var(--text2);border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.btn-save{background:var(--b);color:#fff;border:none;padding:8px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto;transition:background .15s}
.btn-save:hover{background:var(--b2)}

/* ── ADD SHEET ── */
.sheet-bg{position:fixed;inset:0;background:rgba(26,17,24,.45);z-index:300;display:none;backdrop-filter:blur(3px)}
.sheet-bg.on{display:block}
.add-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(95vw,480px);background:var(--card);border-radius:16px 16px 0 0;box-shadow:var(--shadow2);z-index:301;display:none;padding:22px 20px 28px}
.add-sheet.on{display:block}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);text-align:center;margin-bottom:14px}
.sheet-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-opt{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px}
.sheet-opt:hover{border-color:var(--b);background:var(--card);box-shadow:var(--shadow)}
.sheet-opt-ico{font-size:22px}
.sheet-opt-lbl{font-size:13px;font-weight:600;color:var(--text)}
.sheet-opt-desc{font-size:11px;color:var(--text3)}

/* ── MISC ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.35}
.empty-txt{font-size:14px;font-weight:500}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:700px){
  .hdr{padding:0 10px;height:52px}
  .logo{margin-right:8px}
  .logo-text{display:none}
  .ntab span:not(.badge):first-child{display:none}
  .ntab{padding:6px 8px;font-size:11px}
  .view-sw{display:none}
  .cal-body{padding:10px 12px}
  .wk-grid{grid-template-columns:repeat(3,1fr)}
  .mem-tiles{grid-template-columns:repeat(2,1fr)}
  .kanban{grid-template-columns:1fr;overflow-y:auto;height:auto}
  .kb-col{min-height:200px}
}

/* ── PASSWORD GATE ── */
#pw-gate{position:fixed;inset:0;background:var(--b3);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:0}
.pw-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:40px 36px;width:min(90vw,360px);display:flex;flex-direction:column;align-items:center;gap:20px}
.pw-logo{margin-bottom:4px}
.pw-title{font-family:'Playfair Display',serif;font-size:22px;color:#F0E6D0;font-weight:500;text-align:center;line-height:1.3}
.pw-sub{font-size:13px;color:rgba(240,230,208,.5);text-align:center;margin-top:-10px}
.pw-input{width:100%;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 16px;font-family:'Inter',sans-serif;font-size:15px;background:rgba(255,255,255,.08);color:#F0E6D0;outline:none;text-align:center;letter-spacing:3px;transition:border .2s}
.pw-input:focus{border-color:var(--gold)}
.pw-input::placeholder{letter-spacing:0;color:rgba(240,230,208,.3)}
.pw-btn{width:100%;background:var(--gold);color:var(--b3);border:none;border-radius:10px;padding:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.pw-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.pw-err{font-size:12px;color:#FF8A80;text-align:center;min-height:16px}
#pw-gate.hidden{display:none}
/* ── LOADING ── */
#db-loading{position:fixed;inset:0;background:var(--b3);display:flex;align-items:center;justify-content:center;z-index:998;flex-direction:column;gap:12px}
#db-loading.hidden{display:none}
.db-spinner{width:32px;height:32px;border:3px solid rgba(201,169,110,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.db-loading-txt{font-size:13px;color:rgba(240,230,208,.5);font-family:'Inter',sans-serif}
</style>

// ── CALENDAR ────────────────────────────────────────────
function calHTML(){

  return`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden"><div class="cal-toolbar"><button class="nav-btn" onclick="calNav(-1)">&#8249;</button><button class="today-btn" onclick="goToday()">Today</button><button class="nav-btn" onclick="calNav(1)">&#8250;</button><span class="cal-label">${lbl}</span><div class="view-sw">${vb}</div></div><div class="cal-body">${body}</div></div>`;
}
function wkLbl(){const s=new Date(calDate);s.setDate(s.getDate()-s.getDay());const e=new Date(s);e.setDate(e.getDate()+6);return`${s.getDate()} ${MS[s.getMonth()]} &mdash; ${e.getDate()} ${MS[e.getMonth()]} ${s.getFullYear()}`}
function agHTML(){
  const today=new Date(),end=new Date(calDate.getFullYear(),calDate.getMonth()+3,0);
  let bm={};let d=new Date(calDate.getFullYear(),calDate.getMonth(),1);
  while(d<=end){const ds=dstr(d.getFullYear(),d.getMonth(),d.getDate()),evs=evOn(ds);if(evs.length){const k=d.getFullYear()+'-'+d.getMonth();if(!bm[k])bm[k]={lbl:M[d.getMonth()]+' '+d.getFullYear(),days:[]};bm[k].days.push({d:new Date(d),ds,evs})}d.setDate(d.getDate()+1)}
  if(!Object.keys(bm).length)return'<div class="empty"><div class="empty-ico">📅</div><div class="empty-txt">No events this period</div></div>';
  return Object.values(bm).map(mo=>'<div class="ag-section"><div class="ag-month">'+mo.lbl+'</div>'+mo.days.map(day=>{
    const isT=today.toDateString()===day.d.toDateString();
    return'<div class="ag-day"><div class="ag-date'+(isT?' today':'')+'"><div class="ag-date-num">'+day.d.getDate()+'</div><div class="ag-date-day">'+D[day.d.getDay()]+'</div></div><div class="ag-events">'+day.evs.map(e=>{
      const t=tc(e.type),fr=parseFloat(e.fTarget)||0,ra=parseFloat(e.fRaised)||0,pct=fr>0?Math.min(100,ra/fr*100):0;
      return'<div class="ag-card" onclick="openEv(\''+e.id+'\')"><div class="ag-bar" style="background:'+t.c+'"></div><div class="ag-body"><div class="ag-title">'+e.title+'</div><div class="ag-meta"><span class="ag-tag" style="background:'+t.bg+';color:'+t.c+'">'+t.l+'</span>'+(e.place?'<span class="ag-place">&#128205; '+e.place+'</span>':'')+'</div>'+(e.next?'<div class="ag-next" style="border-left-color:'+t.c+'"><div class="ag-next-lbl" style="color:'+t.c+'">Next steps</div>'+e.next+'</div>':'')+(fr>0?'<div class="ag-fr"><div class="ag-fr-row"><span>Fundraising</span><span class="ag-fr-val">R'+ra.toLocaleString()+' / R'+fr.toLocaleString()+'</span></div><div class="ag-fr-track"><div class="ag-fr-fill" style="width:'+pct+'%"></div></div></div>':'')+'</div>'+(e.members&&e.members.length?'<div class="ag-avs">'+e.members.slice(0,4).map(id=>avH(id)).join('')+'</div>':'')+'</div>';
    }).join('')+'</div></div>';
  }).join('')+'</div>').join('');
}
function moHTML(){
  const y=calDate.getFullYear(),mi=calDate.getMonth(),first=new Date(y,mi,1).getDay(),dim=new Date(y,mi+1,0).getDate(),today=new Date();
  let h='<div class="month-grid">'+D.map(d=>'<div class="dh">'+d+'</div>').join('');
  for(let i=0;i<first;i++)h+='<div class="dc om"></div>';
  for(let d=1;d<=dim;d++){
    const ds=dstr(y,mi,d),evs=evOn(ds),isT=today.getFullYear()===y&&today.getMonth()===mi&&today.getDate()===d;
    const side=d%7<4?'left:105%':'right:105%;left:auto';
    const prev=evs.length?'<div class="dhp" style="'+side+'"><h4>'+d+' '+MS[mi]+'</h4>'+evs.map(e=>{const t=tc(e.type);return'<div class="dhp-row"><div class="dhp-dot" style="background:'+t.c+'"></div><div><div class="dhp-title">'+e.title+'</div>'+(e.place?'<div class="dhp-place">'+e.place+'</div>':'')+'</div></div>'}).join('')+'</div>':'';
    h+='<div class="dc'+(isT?' tod':'')+'" onclick="dayClick(\''+ds+'\')"><div class="dn">'+d+'</div>'+evs.slice(0,3).map(e=>{const t=tc(e.type);return'<div class="ec" style="background:'+t.bg+';color:'+t.c+'" onclick="event.stopPropagation();openEv(\''+e.id+'\')">'+e.title+'</div>'}).join('')+(evs.length>3?'<div class="more">+'+(evs.length-3)+'</div>':'')+prev+'</div>';
  }
  return h+'</div>';
}
function wkHTML(){
  const s=new Date(calDate);s.setDate(s.getDate()-s.getDay());const today=new Date();

  return h+'</div>';
}

// ── TASKS ────────────────────────────────────────────────
function tasksHTML(){
  const filters=[['all','All'],['todo','To Do'],['prog','In Progress'],['done','Done'],['high','High Priority']];
  let filtered=tasks;
  if(taskFilter==='todo')filtered=tasks.filter(t=>t.status==='todo');
  else if(taskFilter==='prog')filtered=tasks.filter(t=>t.status==='prog');
  else if(taskFilter==='done')filtered=tasks.filter(t=>t.status==='done');
  else if(taskFilter==='high')filtered=tasks.filter(t=>t.priority==='high');

  const todo=filtered.filter(t=>t.status==='todo');
  const prog=filtered.filter(t=>t.status==='prog');
  const done=filtered.filter(t=>t.status==='done');

  const filterBtns=filters.map(([v,l])=>`<button class="tf-btn${taskFilter===v?' active':''}" onclick="setTaskFilter('${v}')">${l}</button>`).join('');

  const taskCard=t=>{
    const p=PRI[t.priority]||PRI.mid;
    const ev=t.eventId?evById(t.eventId):null;
    const od=isOverdue(t.due)&&t.status!=='done';
    return`<div class="task-card" onclick="openTask('${t.id}')">
      <div class="task-avs">${(t.members||[]).slice(0,3).map(id=>avH(id,22)).join('')}</div>
      <div class="task-card-title">${t.title}</div>
      <div class="task-card-meta">
        <span class="task-pri ${p.cls}">${p.l}</span>
        ${t.due?`<span class="task-due${od?' overdue':''}">&#128197; ${fmtD(t.due)}${od?' &middot; Overdue':''}</span>`:''}
      </div>
      ${ev?`<div class="task-event-link">&#128279; ${ev.title}</div>`:''}
      ${t.notes?`<div class="task-notes">${t.notes}</div>`:''}
    </div>`;
  };

  const colHTML=(items,status,cls,addStatus)=>`
    <div class="kb-col ${cls}">
      <div class="kb-col-head">
        <span class="kb-col-title">${STA[status].l}</span>
        <span class="kb-count">${items.length}</span>
      </div>
      <div class="kb-cards">
        <button class="kb-add-btn" onclick="newTaskWithStatus('${addStatus}')">&#43; Add task</button>
        ${items.length?items.map(taskCard).join(''):'<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">No tasks</div>'}
      </div>
    </div>`;

  return`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div class="tasks-toolbar">
      <span class="tasks-title">Tasks</span>
      <div class="tasks-filter">${filterBtns}</div>
    </div>
    <div class="kanban">
      ${colHTML(todo,'todo','kb-todo','todo')}
      ${colHTML(prog,'prog','kb-prog','prog')}
      ${colHTML(done,'done','kb-done','done')}
    </div>
  </div>`;
}

// ── MEN ───────────────────────────────────────────────────
function menHTML(){
  const today=new Date();
  const fil=members.filter(m=>!memSearch||m.name.toLowerCase().includes(memSearch.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name));
  const bdays=members.map(m=>{if(!m.dob)return null;const[y,mo,d]=m.dob.split('-').map(Number);let bd=new Date(today.getFullYear(),mo-1,d);if(bd<today)bd=new Date(today.getFullYear()+1,mo-1,d);return{...m,bd,diff:Math.ceil((bd-today)/864e5)}}).filter(Boolean).sort((a,b)=>a.diff-b.diff).slice(0,7);

  const taskBadges=m=>{
    const mt=tasksForMan(m.id);
    const open=mt.filter(t=>t.status!=='done').length;
    if(!open)return'';

    return(hi?`<span class="man-task-mini" style="background:#FDECEA;color:#C0392B">&#9679; ${hi} high</span>`:'')+
           (open-hi?`<span class="man-task-mini" style="background:var(--bg2);color:var(--text2)">&#9679; ${open-hi} open</span>`:'');
  };

  const tileR=m=>{const a=age(m.dob);const mt=tasksForMan(m.id).filter(t=>t.status!=='done').length;return`<div class="mem-tile" onclick="openMem('${m.id}')"><div class="mem-tile-av">${ini(m.name)}</div><div class="mem-tile-name">${m.name}</div><div class="mem-tile-sub">${m.trade||''}${a!==null?'<br>'+a+' yrs':''}</div>${mt?`<div style="margin-top:6px"><span class="man-task-mini" style="background:var(--bg2);color:var(--text2)">&#10003; ${mt} task${mt>1?'s':''}</span></div>`:''}</div>`;};

  return`<div class="mod-wrap"><div class="mod-toolbar"><div class="mod-title">Men<span class="mod-count">${members.length}</span></div><input class="search-box" placeholder="Search..." value="${memSearch}" oninput="memSearch=this.value;render()"><div class="view-toggle"><button class="vt${memView==='list'?' active':''}" onclick="memView='list';render()">&#9776;</button><button class="vt${memView==='tile'?' active':''}" onclick="memView='tile';render()">&#8862;</button></div></div><div class="bday-strip">${bdays.map(m=>`<div class="bday-card"><div class="bday-name">${m.name.split(' ')[0]}</div><div class="bday-dt">${m.bd.getDate()} ${MS[m.bd.getMonth()]}</div><div class="bday-n">${m.diff}</div><div class="bday-nl">days</div></div>`).join('')}</div><div class="${memView==='tile'?'mem-tiles':'mem-list'}">${fil.map(memView==='tile'?tileR:listR).join('')}${!fil.length?'<div class="empty"><div class="empty-ico">&#128101;</div><div class="empty-txt">No men found</div></div>':''}</div></div>`;
}

    '<div class="fld"><label>Description</label><textarea id="fi-desc">'+esc2(ev.desc)+'</textarea></div>'+
    '<div class="fld"><label>Next Steps</label><textarea id="fi-next">'+esc2(ev.next)+'</textarea></div>'+
    '<div class="frow"><div class="fld"><label>Fundraising Target (R)</label><input id="fi-ftr" type="number" value="'+(ev.fTarget||0)+'"></div><div class="fld"><label>Raised So Far (R)</label><input id="fi-frr" type="number" value="'+(ev.fRaised||0)+'"></div></div>'+
    '<div class="fld"><label>Assigned Men</label><div class="mpicker" id="ev-picker">'+members.map(m=>'<div class="mpick'+(aids.includes(m.id)?' sel':'')+'" data-mid="'+m.id+'" onclick="this.classList.toggle(\'sel\')"><div class="mpick-av">'+ini(m.name)+'</div>'+m.name.split(' ')[0]+'</div>').join('')+'</div></div>'+

  document.getElementById('ev-ftr').innerHTML=(editEv?'<button class="btn-del" onclick="delEv(\''+editEv.id+'\')">Delete</button>':'')+'<button class="btn-cancel" onclick="closeMod(\'ev-modal\')">Cancel</button><button class="btn-save" onclick="saveEv()">Save</button>';
  showMod('ev-modal');
}
window.saveEv=()=>{
  const title=document.getElementById('fi-title').value.trim(),date=document.getElementById('fi-date').value;
  if(!title||!date){alert('Title and date required');return}
  const mids=[...document.querySelectorAll('#ev-picker .mpick.sel')].map(el=>el.dataset.mid);
  const data={title,date,time:document.getElementById('fi-time').value,place:document.getElementById('fi-place').value,type:document.getElementById('fi-type').value,desc:document.getElementById('fi-desc').value,next:document.getElementById('fi-next').value,fTarget:parseFloat(document.getElementById('fi-ftr').value)||0,fRaised:parseFloat(document.getElementById('fi-frr').value)||0,members:mids,isMtg:document.getElementById('fi-mtg').checked};
  if(editEv)Object.assign(editEv,data);else events.push({id:uid(),...data});
  closeMod('ev-modal');render();
};
window.delEv=id=>{if(confirm('Delete this event?')){events=events.filter(e=>e.id!==id);closeMod('ev-modal');render()}};

// ── TASK MODAL ─────────────────────────────────────────────
window.openTask=id=>{editTask=tasks.find(t=>t.id===id);showTaskModal(editTask||{})};
window.newTask=()=>{editTask=null;showTaskModal({})};
window.newTaskWithStatus=s=>{editTask=null;showTaskModal({status:s})};

function showTaskModal(t){
  document.getElementById('task-th').textContent=editTask?'Edit Task':'New Task';
  const aids=t.members||[];
  const evOpts='<option value="">None (standalone)</option>'+events.map(e=>'<option value="'+e.id+'"'+(t.eventId===e.id?' selected':'')+'>'+e.title+' ('+fmtD(e.date)+')</option>').join('');
  document.getElementById('task-body').innerHTML=
    '<div class="fld"><label>Title *</label><input id="ti-title" value="'+esc(t.title)+'" placeholder="What needs to be done?"></div>'+
    '<div class="frow"><div class="fld"><label>Due Date</label><input id="ti-due" type="date" value="'+(t.due||'')+'"></div><div class="fld"><label>Priority</label><select id="ti-pri"><option value="high"'+(t.priority==='high'?' selected':'')+'>High</option><option value="mid"'+(!t.priority||t.priority==='mid'?' selected':'')+'>Medium</option><option value="low"'+(t.priority==='low'?' selected':'')+'>Low</option></select></div></div>'+
    '<div class="fld"><label>Status</label><select id="ti-sta"><option value="todo"'+((!t.status||t.status==='todo')?' selected':'')+'>To Do</option><option value="prog"'+(t.status==='prog'?' selected':'')+'>In Progress</option><option value="done"'+(t.status==='done'?' selected':'')+'>Done</option></select></div>'+
    '<div class="fld"><label>Linked Event</label><select id="ti-ev">'+evOpts+'</select></div>'+
    '<div class="fld"><label>Notes</label><textarea id="ti-notes">'+esc2(t.notes)+'</textarea></div>'+
    '<div class="fld"><label>Assigned Men</label><div class="mpicker" id="task-picker">'+members.map(m=>'<div class="mpick'+(aids.includes(m.id)?' sel':'')+'" data-mid="'+m.id+'" onclick="this.classList.toggle(\'sel\')"><div class="mpick-av">'+ini(m.name)+'</div>'+m.name.split(' ')[0]+'</div>').join('')+'</div></div>';
  document.getElementById('task-ftr').innerHTML=(editTask?'<button class="btn-del" onclick="delTask(\''+editTask.id+'\')">Delete</button>':'')+'<button class="btn-cancel" onclick="closeMod(\'task-modal\')">Cancel</button><button class="btn-save" onclick="saveTask()">Save</button>';
  showMod('task-modal');
}
window.saveTask=()=>{
  const title=document.getElementById('ti-title').value.trim();
  if(!title){alert('Title required');return}
  const mids=[...document.querySelectorAll('#task-picker .mpick.sel')].map(el=>el.dataset.mid);
  const evSel=document.getElementById('ti-ev').value;
  const data={title,due:document.getElementById('ti-due').value,priority:document.getElementById('ti-pri').value,status:document.getElementById('ti-sta').value,eventId:evSel||null,notes:document.getElementById('ti-notes').value,members:mids};
  if(editTask)Object.assign(editTask,data);else tasks.push({id:uid(),...data});
  closeMod('task-modal');render();

window.delTask=id=>{if(confirm('Delete this task?')){tasks=tasks.filter(t=>t.id!==id);closeMod('task-modal');render()}};

// ── MAN MODAL ──────────────────────────────────────────────
window.openMem=id=>{editMem=members.find(m=>m.id===id);showMemModal(editMem||{})};
window.newMember=()=>{editMem=null;showMemModal({})};

function showMemModal(m){
  document.getElementById('mem-th').textContent=editMem?'Edit Man':'New Man';
  const a=m.dob?age(m.dob):null;
  const mt=editMem?tasksForMem(editMem.id):[];
  const taskSection=mt.length?'<div class="fld"><label>Tasks ('+mt.length+')</label><div style="display:flex;flex-direction:column;gap:6px">'+mt.map(t=>{const p=PRI[t.priority]||PRI.mid;const od=isOverdue(t.due)&&t.status!=='done';return'<div style="background:var(--bg);border-radius:8px;padding:8px 10px;cursor:pointer;border:1px solid var(--border)" onclick="closeMod(\'mem-modal\');openTask(\''+t.id+'\')"><div style="font-size:13px;font-weight:600;margin-bottom:3px">'+t.title+'</div><div style="display:flex;gap:6px;align-items:center"><span class="task-pri '+p.cls+'">'+p.l+'</span>'+(t.due?'<span class="task-due'+(od?' overdue':'')+'" style="font-size:11px">'+fmtD(t.due)+'</span>':'')+'<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:'+(t.status==='done'?'var(--done-bg)':t.status==='prog'?'var(--prog-bg)':'var(--todo-bg)')+';color:'+(t.status==='done'?'var(--done)':t.status==='prog'?'var(--prog)':'var(--todo)')+'">'+STA[t.status].l+'</span></div></div>'}).join('')+'</div></div>':'';
  document.getElementById('mem-body').innerHTML=
    '<div class="fld"><label>Full Name *</label><input id="mi-name" value="'+esc(m.name)+'" placeholder="Full name"></div>'+
    '<div class="fld"><label>Trade / Occupation</label><input id="mi-trade" value="'+esc(m.trade)+'" placeholder="e.g. Electrician, Teacher, Retired..."></div>'+
    '<div class="fld"><label>Date of Birth</label><input id="mi-dob" type="date" value="'+(m.dob||'')+'">'+( a!==null?'<div style="font-size:12px;color:var(--text3);margin-top:5px">'+a+' years old</div>':'')+'</div>'+
    taskSection;
  document.getElementById('mem-ftr').innerHTML=(editMem?'<button class="btn-del" onclick="delMem(\''+editMem.id+'\')">Delete</button>':'')+'<button class="btn-cancel" onclick="closeMod(\'mem-modal\')">Cancel</button><button class="btn-save" onclick="saveMem()">Save</button>';
  showMod('mem-modal');
}
function tasksForMem(mid){return tasks.filter(t=>t.members&&t.members.includes(mid))}
window.saveMem=()=>{
  const name=document.getElementById('mi-name').value.trim();
  if(!name){alert('Name required');return}
  const data={name,trade:document.getElementById('mi-trade').value,dob:document.getElementById('mi-dob').value};
  if(editMem)Object.assign(editMem,data);else members.push({id:uid(),...data});
  closeMod('mem-modal');render();
};
window.delMem=id=>{if(confirm('Remove this man?')){members=members.filter(m=>m.id!==id);closeMod('mem-modal');render()}};

// ── MODALS ─────────────────────────────────────────────────
function showMod(id){document.getElementById('ov').classList.add('on');document.getElementById(id).classList.add('on')}
window.closeMod=id=>{document.getElementById('ov').classList.remove('on');document.getElementById(id).classList.remove('on')};
window.closeAll=()=>{document.getElementById('ov').classList.remove('on');document.querySelectorAll('.modal').forEach(m=>m.classList.remove('on'))};
window.openSheet=()=>{document.getElementById('sbg').classList.add('on');document.getElementById('asheet').classList.add('on')};
window.closeSheet=()=>{document.getElementById('sbg').classList.remove('on');document.getElementById('asheet').classList.remove('on')};


// ── PASSWORD ────────────────────────────────────────────────
const APP_PASSWORD = 'redeemer2026';
window.checkPw = () => {
  const val = document.getElementById('pw-input').value;
  if(val === APP_PASSWORD) {
    sessionStorage.setItem('cmm_auth','1');

// ── FIREBASE CRUD ────────────────────────────────────────────
async function loadFromFirebase() {
  const db = window._db;
  const {collection, getDocs} = window._fb;
  const [evSnap, taskSnap, memSnap] = await Promise.all([
    getDocs(collection(db,'events')),
    getDocs(collection(db,'tasks')),
    getDocs(collection(db,'members'))
  ]);
  if(!evSnap.empty) events = evSnap.docs.map(d=>({id:d.id,...d.data()}));
  if(!taskSnap.empty) tasks = taskSnap.docs.map(d=>({id:d.id,...d.data()}));
  if(!memSnap.empty) members = memSnap.docs.map(d=>({id:d.id,...d.data()}));
  return !evSnap.empty;
}

async function seedFirebase() {
  const db = window._db;
  const {collection, addDoc} = window._fb;
  for(const e of events) { const {id,...d}=e; await addDoc(collection(db,'events'),d); }
  for(const t of tasks)  { const {id,...d}=t; await addDoc(collection(db,'tasks'),d); }
  for(const m of members){ const {id,...d}=m; await addDoc(collection(db,'members'),d); }
}

async function saveToFirebase(col, item) {
  const db = window._db;
  const {collection, addDoc, doc, updateDoc, setDoc} = window._fb;
  if(item._new) {
    delete item._new;
    const ref = await addDoc(collection(db, col), item);
    item.id = ref.id;
  } else {
    const {id,...data} = item;
    await updateDoc(doc(db, col, id), data);
  }
}

async function deleteFromFirebase(col, id) {
  const db = window._db;
  const {doc, deleteDoc} = window._fb;
  await deleteDoc(doc(db, col, id));
}

// ── BOOT ─────────────────────────────────────────────────────
async function bootApp() {
  document.getElementById('db-loading').classList.remove('hidden');
  try {
    // Wait for Firebase if not ready yet
    if(!window._dbReady) {
      await new Promise(res => window.addEventListener('dbready', res, {once:true}));
    }
    const hasData = await loadFromFirebase();
    if(!hasData) await seedFirebase();
  } catch(e) {
    console.warn('Firebase unavailable, running locally:', e);
  }
  document.getElementById('db-loading').classList.add('hidden');
  render();
}

// ── OVERRIDE SAVE/DELETE TO PERSIST ──────────────────────────
const _origSaveEv = window.saveEv;
window.saveEv = async () => {
  const isNew = !editEv;
  _origSaveEv();
  const item = isNew ? events[events.length-1] : editEv;
  if(window._dbReady) try { await saveToFirebase('events', item); } catch(e){}
};

const _origSaveTask = window.saveTask;
window.saveTask = async () => {
  const isNew = !editTask;
  _origSaveTask();
  const item = isNew ? tasks[tasks.length-1] : editTask;
  if(window._dbReady) try { await saveToFirebase('tasks', item); } catch(e){}
};

const _origSaveMem = window.saveMem;
window.saveMem = async () => {
  const isNew = !editMem;
  _origSaveMem();
  const item = isNew ? members[members.length-1] : editMem;
  if(window._dbReady) try { await saveToFirebase('members', item); } catch(e){}
};

const _origDelEv = window.delEv;
window.delEv = async (id) => {
  if(window._dbReady) try { await deleteFromFirebase('events', id); } catch(e){}
  _origDelEv(id);
};

const _origDelTask = window.delTask;
window.delTask = async (id) => {
  if(window._dbReady) try { await deleteFromFirebase('tasks', id); } catch(e){}
  _origDelTask(id);
};

const _origDelMem = window.delMem;
window.delMem = async (id) => {
  if(window._dbReady) try { await deleteFromFirebase('members', id); } catch(e){}
  _origDelMem(id);
};

// ── START ─────────────────────────────────────────────────────
if(sessionStorage.getItem('cmm_auth')==='1') {
  document.getElementById('pw-gate').classList.add('hidden');
  bootApp();
} else {
  setTimeout(()=>document.getElementById('pw-input').focus(), 100);
}
