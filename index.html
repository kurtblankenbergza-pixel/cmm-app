<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">

<title>Men's Ministry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,getDocs,addDoc,doc,setDoc,updateDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FB={apiKey:"AIzaSyAMZ-4sggqB4X0jj3i7RercY2DjCiIZwcg",authDomain:"holy-redeemer-cmm-calendar.firebaseapp.com",projectId:"holy-redeemer-cmm-calendar",storageBucket:"holy-redeemer-cmm-calendar.firebasestorage.app",messagingSenderId:"397429201163",appId:"1:397429201163:web:5644262892b1939a16ea0e"};

window._db=db;window._fb={collection,getDocs,addDoc,doc,setDoc,updateDoc,deleteDoc};
window._dbReady=true;window.dispatchEvent(new Event('dbready'));
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b:#7B1230;--b2:#5C0D23;--b3:#2E0810;
  --gold:#C9A96E;--gold2:#E8C98A;
  --bg:#F5F1EE;--bg2:#EBE6E1;--card:#FFF;
  --text:#18100F;--t2:#6B5B58;--t3:#A8948F;
  --bdr:#E4D8D4;--bdr2:#D5C5C0;
  --green:#1A6B3E;--red:#B83030;--red-bg:#FAEAEA;
  --todo:#2D52C4;--todo-bg:#EEF1FF;
  --prog:#C46B0A;--prog-bg:#FEF5E7;
  --done:#1A6B3E;--done-bg:#E6F4EE;
  --sh:0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.06);
  --sh2:0 4px 24px rgba(0,0,0,.12);
  --sh3:0 -1px 0 rgba(0,0,0,.05),0 -8px 24px rgba(0,0,0,.1);
  --r:12px;--r2:10px;--r3:8px;
  --si-top:env(safe-area-inset-top,0px);
  --si-bot:env(safe-area-inset-bottom,0px);
  --topbar:52px;--botbar:56px;
}
html{height:100%;overflow:hidden;background:var(--b3)}
body{
  font-family:'Inter',sans-serif;font-size:14px;color:var(--text);
  background:var(--bg);
  height:calc(100vh - var(--si-bot));
  padding-top:calc(var(--topbar) + var(--si-top));
  padding-bottom:calc(var(--botbar) + var(--si-bot));
  display:flex;flex-direction:column;overflow:hidden;
}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:80;
  height:calc(var(--topbar) + var(--si-top));
  padding-top:var(--si-top);
  background:var(--b3);
  display:flex;align-items:center;
  padding-left:16px;padding-right:14px;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.tb-logo{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.tb-cross svg{width:26px;height:26px;flex-shrink:0}
.tb-name{font-family:'Playfair Display',serif;font-size:14px;color:rgba(240,228,208,.9);font-weight:500;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-add{
  flex-shrink:0;background:var(--gold);color:var(--b3);border:none;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;
  height:34px;padding:0 15px;border-radius:20px;cursor:pointer;
  display:flex;align-items:center;gap:5px;letter-spacing:.1px;
}
.tb-add:active{opacity:.8;transform:scale(.96)}
.tb-add svg{width:13px;height:13px;stroke:var(--b3);stroke-width:2.8;fill:none}

/* ── BOTTOM NAV ── */
#botnav{
  position:fixed;bottom:0;left:0;right:0;z-index:80;
  height:calc(var(--botbar) + var(--si-bot));
  padding-bottom:var(--si-bot);
  background:var(--b3);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;
}
.nt{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;
  color:rgba(240,228,208,.3);font-family:'Inter',sans-serif;
  padding:6px 0;position:relative;transition:color .18s;
}
.nt.on{color:var(--gold)}
.nt-ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;position:relative}
.nt-ico svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.7;fill:none;transition:stroke-width .18s}
.nt.on .nt-ico svg{stroke-width:2.3}
.nt-lbl{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.nt-dot{
  position:absolute;top:-3px;right:-5px;
  background:var(--red);color:#fff;font-size:8px;font-weight:700;
  min-width:15px;height:15px;border-radius:8px;padding:0 3px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--b3);line-height:1;
}

/* ── PAGE ── */
#app{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.pg{display:flex;flex-direction:column;height:100%;overflow:hidden}
.pg-hdr{display:flex;align-items:center;gap:8px;padding:11px 16px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr)}
.pg-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;flex:1}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scrl::-webkit-scrollbar{display:none}
.pad{padding:14px 16px}

/* ── CAL NAV ── */
.cal-nav{display:flex;align-items:center;gap:0;padding:0 16px;height:46px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr)}
.c-arrow{width:32px;height:32px;border-radius:50%;border:none;background:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.c-arrow:active{background:var(--bg2)}
.c-title{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:500}
.c-today{background:none;border:1.5px solid var(--bdr2);color:var(--t2);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;cursor:pointer;flex-shrink:0}
.c-today:active{border-color:var(--b);color:var(--b)}

/* ── PILLS ── */
.pills{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pi{flex-shrink:0;background:none;border:1.5px solid var(--bdr);color:var(--t2);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
.pi.on{background:var(--b);border-color:var(--b);color:#fff}
.pi:active{transform:scale(.94)}

/* ── AGENDA ── */
.ag-sec{margin-bottom:20px}
.ag-mlbl{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--bdr)}
.ag-day{display:flex;gap:10px;margin-bottom:2px}
.ag-dc{width:40px;flex-shrink:0;text-align:right;padding-top:2px}
.ag-dn{font-size:20px;font-weight:300;color:var(--t2);line-height:1}
.ag-dd{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);font-weight:600;margin-top:2px}
.ag-dc.tod .ag-dn{color:var(--b);font-weight:700}
.ag-evts{flex:1;border-left:2px solid var(--bdr);padding-left:11px;padding-bottom:12px}
.ag-card{background:var(--card);border-radius:var(--r);padding:11px 12px;margin-bottom:7px;cursor:pointer;border:1px solid var(--bdr);display:flex;gap:9px;box-shadow:var(--sh)}
.ag-card:active{transform:scale(.985);opacity:.85}
.ag-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:26px}
.ag-cnt{flex:1;min-width:0}
.ag-ttl{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.35}
.ag-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ag-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.ag-plc{font-size:11px;color:var(--t3)}
.ag-nxt{font-size:11px;color:var(--t2);margin-top:5px;padding:5px 8px;background:var(--bg);border-radius:6px;border-left:3px solid}
.ag-nxt-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.ag-fr{margin-top:6px}
.ag-fr-row{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:2px}
.ag-fr-v{color:var(--green);font-weight:600}
.ag-fr-track{height:3px;background:var(--bg2);border-radius:2px;overflow:hidden}
.ag-fr-fill{height:100%;background:linear-gradient(90deg,var(--green),#2ECC71);border-radius:2px}
.ag-avs{display:flex;flex-shrink:0;align-items:flex-start;margin-left:2px}
.av{width:22px;height:22px;border-radius:50%;background:var(--b);color:var(--gold);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);margin-left:-5px;flex-shrink:0}
.av:first-child{margin-left:0}

/* ── MONTH ── */
.month-wrap{width:100%}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:var(--bdr);gap:1px}
.mh{background:var(--bg2);text-align:center;padding:7px 0;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3)}
.mc{background:var(--card);min-height:60px;padding:4px 3px;cursor:pointer;overflow:hidden}
.mc:active{background:var(--bg2)}
.mc.om{background:#F8F5F2;opacity:.6}
.mc.tod .mdn{background:var(--b);color:#fff;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.mdn{font-size:10px;font-weight:500;color:var(--t2);margin-bottom:2px;width:19px;height:19px;display:flex;align-items:center;justify-content:center}
.mec{font-size:8px;padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;line-height:1.4;display:block}
.mmore{font-size:8px;color:var(--t3);padding:0 1px;font-weight:500}

/* ── WEEK ── */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wk-col{background:var(--card);border-radius:var(--r3);border:1px solid var(--bdr);overflow:hidden}
.wk-col.tod{border-color:var(--b);border-width:2px}
.wk-hd{padding:6px 3px;text-align:center;border-bottom:1px solid var(--bdr);background:var(--bg)}
.wk-dn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.wk-dd{font-size:16px;font-weight:300;color:var(--text);margin-top:1px}
.wk-col.tod .wk-dd{color:var(--b);font-weight:600}
.wk-evts{padding:4px;min-height:60px}
.wk-chip{padding:3px 4px;border-radius:3px;margin-bottom:2px;cursor:pointer;font-size:8px;font-weight:600;display:block;line-height:1.3}
.wk-plus{background:none;border:1px dashed var(--bdr);color:var(--t3);width:100%;padding:2px;border-radius:3px;cursor:pointer;font-size:12px;margin-top:2px}

/* ── KANBAN ── */
.kb-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.kb-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.kb-body::-webkit-scrollbar{display:none}
.kb-col{background:var(--bg2);border-radius:var(--r);overflow:hidden}
.kb-hd{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.06)}
.kb-ht{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.kb-hc{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.kb-todo .kb-ht{color:var(--todo)}.kb-todo .kb-hc{background:var(--todo-bg);color:var(--todo)}
.kb-prog .kb-ht{color:var(--prog)}.kb-prog .kb-hc{background:var(--prog-bg);color:var(--prog)}
.kb-done .kb-ht{color:var(--done)}.kb-done .kb-hc{background:var(--done-bg);color:var(--done)}
.kb-cards{padding:8px}
.kb-add{background:none;border:1.5px dashed var(--bdr);color:var(--t3);width:100%;padding:8px;border-radius:var(--r3);cursor:pointer;font-size:12px;margin-bottom:7px;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px}
.kb-add:active{border-color:var(--b);color:var(--b)}
.tk-card{background:var(--card);border-radius:var(--r3);padding:11px 12px;margin-bottom:6px;cursor:pointer;border:1px solid var(--bdr);box-shadow:var(--sh);position:relative}
.tk-card:active{transform:scale(.98)}
.tk-ttl{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4;padding-right:22px}
.tk-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tk-pri{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.hi{background:#FDECEA;color:#B83030}.mi{background:#FEF5E7;color:#C46B0A}.lo{background:var(--done-bg);color:var(--done)}
.tk-due{font-size:10px;color:var(--t3)}.tk-due.od{color:var(--red);font-weight:600}
.tk-ev{font-size:9px;color:var(--b);background:#F5E8EC;padding:2px 6px;border-radius:20px;font-weight:600;margin-top:4px;display:inline-block}
.tk-avs{display:flex;position:absolute;top:10px;right:10px}
.tk-notes{font-size:10px;color:var(--t3);margin-top:4px;line-height:1.4;border-top:1px solid var(--bdr);padding-top:4px}

/* ── MEETINGS ── */
.mtg-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 14px;cursor:pointer;display:flex;gap:12px;margin-bottom:8px;box-shadow:var(--sh)}
.mtg-card:active{transform:scale(.985);opacity:.85}
.mtg-db{width:44px;flex-shrink:0;text-align:center;background:var(--bg);border-radius:var(--r3);padding:7px 4px}
.mtg-dd{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);font-weight:700}
.mtg-dn{font-size:20px;font-weight:300;color:var(--text);line-height:1;margin-top:2px}
.mtg-dm{font-size:9px;color:var(--t3);font-weight:600}
.mtg-body{flex:1;min-width:0}
.mtg-ttl{font-size:13px;font-weight:600;margin-bottom:3px}
.mtg-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.mtg-plc{font-size:11px;color:var(--t3)}
.mtg-box{background:var(--bg);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--t2);border-left:3px solid var(--bdr);margin-top:4px}
.mtg-box-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--b);margin-bottom:1px}
.mtg-avs{display:flex;margin-top:6px}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:8px}

/* ── FUNDRAISING ── */
.fr-hero{background:linear-gradient(140deg,var(--b3),var(--b));border-radius:var(--r);padding:18px;margin-bottom:14px;color:#fff}
.fr-hl{font-size:10px;font-weight:600;opacity:.55;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.fr-ht{font-size:38px;font-weight:300;line-height:1;margin-bottom:3px}
.fr-ht small{font-size:15px;opacity:.45}
.fr-hs{font-size:11px;opacity:.55;margin-bottom:12px}
.fr-hbar{height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.fr-hfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px}
.fr-stats{display:flex;margin-top:12px}
.fr-st{flex:1;text-align:center}
.fr-sv{font-size:16px;font-weight:600;color:var(--gold);line-height:1}
.fr-sl{font-size:9px;opacity:.45;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.fr-slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:9px}
.fr-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;cursor:pointer;margin-bottom:8px;box-shadow:var(--sh)}
.fr-card:active{transform:scale(.985)}
.fr-ctop{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.fr-cico{width:36px;height:36px;border-radius:9px;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fr-cinfo{flex:1;min-width:0}
.fr-cttl{font-size:13px;font-weight:600;margin-bottom:1px}
.fr-cdt{font-size:10px;color:var(--t3)}
.fr-camt{text-align:right;flex-shrink:0}
.fr-cr{font-size:17px;font-weight:700;color:var(--green)}
.fr-ctgt{font-size:10px;color:var(--t3)}
.fr-cbar{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.fr-cfill{height:100%;background:linear-gradient(90deg,var(--green),#2ECC71);border-radius:3px}
.fr-cfoot{display:flex;justify-content:space-between;align-items:center}
.fr-cpct{font-size:11px;font-weight:600;color:var(--green)}

/* ── MEN ── */
.bday-strip{background:linear-gradient(140deg,var(--b3),var(--b));border-radius:var(--r);padding:11px 12px;margin-bottom:12px;display:flex;gap:9px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.bday-strip::-webkit-scrollbar{display:none}
.bday-card{background:rgba(255,255,255,.09);border-radius:var(--r3);padding:9px 12px;flex-shrink:0;text-align:center;min-width:74px}
.bday-n{font-size:10px;font-weight:600;color:#F0E4D0;white-space:nowrap}
.bday-dt{font-size:9px;color:var(--gold);margin-top:1px}
.bday-cnt{font-size:20px;font-weight:300;color:#fff;margin-top:2px;line-height:1}
.bday-lbl{font-size:8px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.6px}
.vtog{display:flex;background:var(--bg2);border-radius:var(--r3);padding:2px;gap:1px}
.vt{background:none;border:none;padding:5px 9px;border-radius:6px;cursor:pointer;color:var(--t3);font-size:13px;transition:all .15s}
.vt.on{background:var(--card);color:var(--text);box-shadow:var(--sh)}
.sort-btns{display:flex;gap:5px}
.sort-btn{background:none;border:1.5px solid var(--bdr);color:var(--t2);font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
.sort-btn.on{background:var(--b);border-color:var(--b);color:#fff}
.mem-list{display:flex;flex-direction:column;gap:5px}
.mem-row{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--sh)}
.mem-row:active{transform:scale(.985)}
.mem-av{width:38px;height:38px;border-radius:50%;background:var(--b);color:var(--gold);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:13px;font-weight:600}
.mem-sub{font-size:11px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.mem-age{background:var(--bg2);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--t2)}
.mem-rdot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.mem-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.mem-tile{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 10px;text-align:center;cursor:pointer;box-shadow:var(--sh)}
.mem-tile:active{transform:scale(.97)}
.mem-tav{width:46px;height:46px;border-radius:50%;background:var(--b);color:var(--gold);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 7px}
.mem-tname{font-size:12px;font-weight:600;margin-bottom:2px}

.sh-drag{width:38px;height:4px;background:var(--bdr2);border-radius:2px;margin:10px auto 0;flex-shrink:0}

.sh-x{background:var(--bg2);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.sh-x:active{background:var(--bdr)}
.sh-body{overflow-y:auto;padding:0 18px 10px;flex:1;-webkit-overflow-scrolling:touch}

.flds{display:flex;flex-direction:column;gap:12px}

.f label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t2)}

.f textarea{min-height:64px;resize:none;line-height:1.5}
.mpc{display:flex;flex-wrap:wrap;gap:6px}
.mp{display:flex;align-items:center;gap:5px;padding:7px 12px 7px 7px;border-radius:22px;background:var(--bg);border:1.5px solid var(--bdr);cursor:pointer;font-size:12px;font-weight:500;user-select:none;transition:all .15s}

.mp-av{width:18px;height:18px;border-radius:50%;background:var(--b2);color:var(--gold);font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mp.on .mp-av{background:rgba(255,255,255,.2);color:#fff}

.btn-c{background:var(--bg2);color:var(--t2);border:none;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.btn-s{background:var(--b);color:#fff;border:none;padding:11px 0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;flex:1}

// ── CALENDAR ─────────────────────────────────────────────────
function calHTML(){
  const y=calD.getFullYear(),mi=calD.getMonth();
  const lbl=calV==='week'?wkLbl():`${M[mi]} ${y}`;
  const pills=['agenda','month','week'].map(v=>`<button class="pi${calV===v?' on':''}" onclick="setV('${v}')">${v[0].toUpperCase()+v.slice(1)}</button>`).join('');
  const body=calV==='agenda'?agHTML():calV==='month'?moHTML():wkHTML();
  return`<div class="pg">
    <div class="cal-nav">
      <button class="c-arrow" onclick="calN(-1)">&#8249;</button>
      <span class="c-title">${lbl}</span>
      <button class="c-today" onclick="goT()">Today</button>
      <button class="c-arrow" onclick="calN(1)">&#8250;</button>
    </div>
    <div class="pills">${pills}</div>
    <div class="scrl pad">${body}</div>
  </div>`;
}
function wkLbl(){const s=new Date(calD);s.setDate(s.getDate()-s.getDay());const e=new Date(s);e.setDate(e.getDate()+6);return`${s.getDate()} ${MS[s.getMonth()]} – ${e.getDate()} ${MS[e.getMonth()]}`}

function agHTML(){
  const today=new Date(),end=new Date(calD.getFullYear(),calD.getMonth()+3,0);
  // start from today's month if current month
  const startD=new Date(calD.getFullYear(),calD.getMonth(),1);
  let bm={};let d=new Date(startD);
  while(d<=end){
    const ds=dstr(d.getFullYear(),d.getMonth(),d.getDate()),evs=evOn(ds);
    if(evs.length){const k=d.getFullYear()+'-'+d.getMonth();if(!bm[k])bm[k]={lbl:M[d.getMonth()]+' '+d.getFullYear(),days:[]};bm[k].days.push({d:new Date(d),ds,evs})}
    d.setDate(d.getDate()+1);
  }
  if(!Object.keys(bm).length)return'<div class="empty"><div class="empty-ico">📅</div><div class="empty-txt">No events this period</div></div>';
  return Object.values(bm).map(mo=>`<div class="ag-sec"><div class="ag-mlbl">${mo.lbl}</div>${mo.days.map(day=>{
    const isT=today.toDateString()===day.d.toDateString();
    return`<div class="ag-day"><div class="ag-dc${isT?' tod':''}"><div class="ag-dn">${day.d.getDate()}</div><div class="ag-dd">${D[day.d.getDay()].slice(0,3)}</div></div><div class="ag-evts">${day.evs.map(e=>{
      const t=tc(e.type),fr=parseFloat(e.fT)||0,ra=parseFloat(e.fR)||0,pct=fr>0?Math.min(100,ra/fr*100):0;
      return`<div class="ag-card" onclick="openEv('${e.id}')"><div class="ag-bar" style="background:${t.c}"></div><div class="ag-cnt"><div class="ag-ttl">${e.title}</div><div class="ag-meta"><span class="ag-tag" style="background:${t.bg};color:${t.c}">${t.l}</span>${e.place?`<span class="ag-plc">📍 ${e.place}</span>`:''}</div>${e.next?`<div class="ag-nxt" style="border-left-color:${t.c}"><div class="ag-nxt-lbl" style="color:${t.c}">Next steps</div>${e.next}</div>`:''} ${fr>0?`<div class="ag-fr"><div class="ag-fr-row"><span>Fundraising</span><span class="ag-fr-v">R${ra.toLocaleString()} / R${fr.toLocaleString()}</span></div><div class="ag-fr-track"><div class="ag-fr-fill" style="width:${pct}%"></div></div></div>`:''}</div>${e.men&&e.men.length?`<div class="ag-avs">${e.men.slice(0,3).map(id=>avH(id)).join('')}</div>`:''}</div>`;
    }).join('')}</div></div>`;
  }).join('')}</div>`).join('');
}

function moHTML(){
  const y=calD.getFullYear(),mi=calD.getMonth();
  const first=new Date(y,mi,1).getDay();
  const dim=new Date(y,mi+1,0).getDate();
  const today=new Date();
  // day headers
  let h=`<div class="month-wrap"><div class="month-grid">`;
  D.forEach(d=>h+=`<div class="mh">${d[0]}</div>`);
  // empty cells before first day
  for(let i=0;i<first;i++)h+=`<div class="mc om"></div>`;
  // day cells
  for(let d=1;d<=dim;d++){
    const ds=dstr(y,mi,d),evs=evOn(ds);
    const isT=today.getFullYear()===y&&today.getMonth()===mi&&today.getDate()===d;
    h+=`<div class="mc${isT?' tod':''}" onclick="dayClk('${ds}')">`;
    h+=`<div class="mdn">${d}</div>`;
    evs.slice(0,2).forEach(e=>{const t=tc(e.type);h+=`<div class="mec" style="background:${t.bg};color:${t.c}">${e.title}</div>`});
    if(evs.length>2)h+=`<div class="mmore">+${evs.length-2}</div>`;
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

function wkHTML(){
  const s=new Date(calD);s.setDate(s.getDate()-s.getDay());const today=new Date();
  let h='<div class="wk-grid">';
  for(let i=0;i<7;i++){
    const d=new Date(s);d.setDate(d.getDate()+i);
    const ds=dstr(d.getFullYear(),d.getMonth(),d.getDate()),evs=evOn(ds),isT=today.toDateString()===d.toDateString();
    h+=`<div class="wk-col${isT?' tod':''}"><div class="wk-hd"><div class="wk-dn">${D[i].slice(0,3)}</div><div class="wk-dd">${d.getDate()}</div></div><div class="wk-evts">${evs.map(e=>{const t=tc(e.type);return`<div class="wk-chip" style="background:${t.bg};color:${t.c}" onclick="openEv('${e.id}')">${e.title}</div>`}).join('')}<button class="wk-plus" onclick="newEvDate('${ds}')">+</button></div></div>`;
  }
  return h+'</div>';
}

    if(bd<today)bd=new Date(today.getFullYear()+1,mo-1,d);

// ── FIREBASE ──────────────────────────────────────────────────
// Rule: Firestore document ID IS the item id. We always use setDoc
// so we control the ID. Never use addDoc (which generates a new ID).

async function fbSave(col, item) {
  if (!window._dbReady) return;
  try {
    const { doc: docRef, setDoc } = window._fb;
    const { id, ...data } = item;
    await setDoc(docRef(window._db, col, id), data);
  } catch (e) { console.warn('fbSave error:', col, e); }
}

async function fbDel(col, id) {
  if (!window._dbReady) return;
  try {
    const { doc: docRef, deleteDoc } = window._fb;
    await deleteDoc(docRef(window._db, col, id));
  } catch (e) { console.warn('fbDel error:', col, e); }
}

async function fbLoad(col) {
  if (!window._dbReady) return null;
  try {
    const { collection, getDocs } = window._fb;
    const snap = await getDocs(collection(window._db, col));
    // Firestore doc.id is the true ID — merge it back as item.id
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.warn('fbLoad error:', col, e); return null; }
}

// ── BOOT ──────────────────────────────────────────────────────
async function boot() {
  document.getElementById('dbl').classList.remove('gone');

  if (window._dbReady) {
    try {
      if (!window._dbReady) await new Promise(res => window.addEventListener('dbready', res, { once: true }));

      // Load all collections from Firebase
      const [fbEvents, fbTasks, fbMen, fbMtgs] = await Promise.all([
        fbLoad('events'), fbLoad('tasks'), fbLoad('members'), fbLoad('meetings')
      ]);

      // If Firebase has data use it; otherwise seed from local defaults
      if (fbEvents && fbEvents.length > 0) {
        events = fbEvents;
      } else {
        // Seed: use setDoc so ID in Firestore matches item.id
        for (const e of events) await fbSave('events', e);
      }

      if (fbTasks && fbTasks.length > 0) {
        tasks = fbTasks;
      } else {
        for (const t of tasks) await fbSave('tasks', t);
      }

      if (fbMen && fbMen.length > 0) {
        men = fbMen;
      } else {
        for (const m of men) await fbSave('members', m);
      }

      if (fbMtgs && fbMtgs.length > 0) {
        meetings = fbMtgs;
      } else {
        for (const m of meetings) await fbSave('meetings', m);
      }

    } catch (e) {
      console.warn('Firebase boot failed, running offline:', e);
    }
  }

  document.getElementById('dbl').classList.add('gone');
  render();
}

// ── PASSWORD ──────────────────────────────────────────────────
window.checkPw=()=>{
  const v=document.getElementById('pw-in').value;
  if(v===PWD){sessionStorage.setItem('cmm_auth','1');document.getElementById('pw').classList.add('gone');boot();}
  else{document.getElementById('pw-err').textContent='Incorrect password';document.getElementById('pw-in').value='';document.getElementById('pw-in').focus();}
};
if(sessionStorage.getItem('cmm_auth')==='1'){document.getElementById('pw').classList.add('gone');boot();}
else setTimeout(()=>document.getElementById('pw-in').focus(),300);
</script>
