<style>
/* ─── RESET & TOKENS ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b:#7B1230;--b2:#5C0D23;--b3:#2E0810;
  --gold:#C9A96E;--gold2:#E8C98A;
  --bg:#F5F1EE;--bg2:#EBE6E1;--card:#FFFFFF;
  --text:#18100F;--t2:#6B5B58;--t3:#A8948F;
  --bdr:#E4D8D4;--bdr2:#D5C5C0;
  --green:#1A6B3E;--red:#B83030;--red-bg:#FAEAEA;
  --todo:#2D52C4;--todo-bg:#EEF1FF;
  --prog:#C46B0A;--prog-bg:#FEF5E7;
  --done:#1A6B3E;--done-bg:#E6F4EE;
  --sh:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.06);
  --sh2:0 4px 24px rgba(0,0,0,.13);
  --sh3:0 -1px 0 rgba(0,0,0,.06),0 -8px 24px rgba(0,0,0,.1);
  --r:12px;--r2:10px;--r3:8px;
  /* safe areas */
  --si-top:env(safe-area-inset-top,0px);
  --si-bot:env(safe-area-inset-bottom,0px);
  /* layout */
  --topbar:52px;
  --botbar:56px;
}

/* ─── ROOT LAYOUT ─────────────────────────────────────────── */
html{height:100%;overflow:hidden;background:var(--b3)}
body{
  font-family:'Inter',sans-serif;font-size:14px;color:var(--text);
  background:var(--bg);
  /* exact viewport: top bar + content + bottom bar */
  height:calc(100vh - var(--si-bot));
  padding-top:calc(var(--topbar) + var(--si-top));
  padding-bottom:calc(var(--botbar) + var(--si-bot));
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}

/* ─── TOP BAR ─────────────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:80;
  height:calc(var(--topbar) + var(--si-top));
  padding-top:var(--si-top);
  background:var(--b3);
  display:flex;align-items:center;
  padding-left:16px;padding-right:16px;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.topbar-logo{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.topbar-logo svg{width:30px;height:30px;flex-shrink:0}
.topbar-name{font-family:'Playfair Display',serif;font-size:15px;color:#F0E4D0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-add{
  flex-shrink:0;
  background:var(--gold);color:var(--b3);border:none;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1px;
  height:34px;padding:0 16px;border-radius:20px;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:opacity .15s;
}
.topbar-add:active{opacity:.8}
.topbar-add svg{width:13px;height:13px;stroke:var(--b3);stroke-width:2.5;fill:none;flex-shrink:0}

/* ─── BOTTOM NAV ──────────────────────────────────────────── */
#botnav{
  position:fixed;bottom:0;left:0;right:0;z-index:80;
  height:calc(var(--botbar) + var(--si-bot));
  padding-bottom:var(--si-bot);
  background:var(--b3);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;
}
.nt{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:rgba(240,228,208,.35);
  font-family:'Inter',sans-serif;
  padding:6px 0;position:relative;
  transition:color .18s;
}
.nt.on{color:var(--gold)}
.nt-ico{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.nt-ico svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.7;fill:none;transition:stroke-width .18s}
.nt.on .nt-ico svg{stroke-width:2.3}
.nt-lbl{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;line-height:1}
.nt-dot{
  position:absolute;top:-2px;right:-4px;
  background:var(--red);color:#fff;
  font-size:8px;font-weight:700;line-height:1;
  min-width:14px;height:14px;border-radius:7px;padding:0 3px;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--b3);
}

/* ─── PAGE CONTENT ────────────────────────────────────────── */
#app{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.pg{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* secondary header inside a page */
.pg-hdr{
  display:flex;align-items:center;gap:8px;
  padding:11px 16px;flex-shrink:0;
  background:var(--card);
  border-bottom:1px solid var(--bdr);
}
.pg-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;flex:1}

/* scrollable area — fills remaining space */
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scrl::-webkit-scrollbar{display:none}
.pad{padding:14px 16px}

/* ─── CAL NAV ─────────────────────────────────────────────── */
.cal-nav{
  display:flex;align-items:center;gap:0;
  padding:0 16px;height:48px;flex-shrink:0;
  background:var(--card);border-bottom:1px solid var(--bdr);
}
.cal-arrow{
  width:34px;height:34px;border-radius:50%;border:none;
  background:none;color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s;
}
.cal-arrow:active{background:var(--bg2)}
.cal-title{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--text)}
.today-btn{
  background:none;border:1.5px solid var(--bdr2);color:var(--t2);
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  padding:5px 11px;border-radius:20px;cursor:pointer;flex-shrink:0;
  transition:all .15s;
}
.today-btn:active{border-color:var(--b);color:var(--b)}

/* ─── PILL STRIP ──────────────────────────────────────────── */
.pill-strip{
  display:flex;gap:6px;overflow-x:auto;
  padding:9px 16px;flex-shrink:0;
  background:var(--card);border-bottom:1px solid var(--bdr);
  scrollbar-width:none;
}
.pill-strip::-webkit-scrollbar{display:none}
.pi{
  flex-shrink:0;background:none;
  border:1.5px solid var(--bdr);color:var(--t2);
  font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:20px;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.pi.on{background:var(--b);border-color:var(--b);color:#fff}
.pi:active{transform:scale(.94)}

/* ─── AGENDA ──────────────────────────────────────────────── */
.ag-sec{margin-bottom:20px}
.ag-mlbl{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--bdr)}
.ag-day{display:flex;gap:10px;margin-bottom:2px}
.ag-dc{width:40px;flex-shrink:0;text-align:right;padding-top:2px}
.ag-dn{font-size:21px;font-weight:300;color:var(--t2);line-height:1}
.ag-dd{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);font-weight:600;margin-top:2px}
.ag-dc.tod .ag-dn{color:var(--b);font-weight:700}
.ag-evts{flex:1;border-left:2px solid var(--bdr);padding-left:11px;padding-bottom:12px}
.ag-card{
  background:var(--card);border-radius:var(--r);
  padding:11px 12px;margin-bottom:7px;cursor:pointer;
  border:1px solid var(--bdr);display:flex;gap:10px;
  box-shadow:var(--sh);
}
.ag-card:active{transform:scale(.985);opacity:.9}
.ag-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:28px}
.ag-cnt{flex:1;min-width:0}
.ag-ttl{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.35}
.ag-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ag-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.ag-plc{font-size:11px;color:var(--t3)}
.ag-nxt{font-size:11px;color:var(--t2);margin-top:5px;padding:5px 8px;background:var(--bg);border-radius:6px;border-left:3px solid transparent}
.ag-nxt-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.ag-fr{margin-top:6px}
.ag-fr-row{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:2px}
.ag-fr-v{color:var(--green);font-weight:600}
.ag-fr-track{height:3px;background:var(--bg2);border-radius:2px;overflow:hidden}
.ag-fr-fill{height:100%;background:linear-gradient(90deg,var(--green),#2ECC71);border-radius:2px}
.ag-avs{display:flex;flex-shrink:0;align-items:flex-start;margin-left:2px}
.av{width:22px;height:22px;border-radius:50%;background:var(--b);color:var(--gold);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);margin-left:-5px;flex-shrink:0}
.av:first-child{margin-left:0}

/* ─── MONTH ───────────────────────────────────────────────── */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bdr);border-radius:var(--r);overflow:hidden}
.mh{background:var(--card);text-align:center;padding:7px 2px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3)}
.mc{background:var(--card);min-height:64px;padding:4px 3px;cursor:pointer}
.mc:active{background:var(--bg2)}
.mc.om{background:var(--bg);opacity:.5}
.mc.tod .mdn{background:var(--b);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.mdn{font-size:10px;font-weight:500;color:var(--t2);margin-bottom:2px;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.mec{font-size:8px;padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;line-height:1.4}
.mmore{font-size:8px;color:var(--t3);padding:0 2px;font-weight:500}

/* ─── WEEK ────────────────────────────────────────────────── */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wk-col{background:var(--card);border-radius:var(--r3);border:1px solid var(--bdr);overflow:hidden}
.wk-col.tod{border-color:var(--b);border-width:2px}
.wk-hd{padding:6px 3px;text-align:center;border-bottom:1px solid var(--bdr);background:var(--bg)}
.wk-dn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.wk-dd{font-size:16px;font-weight:300;color:var(--text);margin-top:1px}
.wk-col.tod .wk-dd{color:var(--b);font-weight:600}
.wk-evts{padding:4px;min-height:60px}
.wk-chip{padding:3px 4px;border-radius:3px;margin-bottom:2px;cursor:pointer;font-size:8px;font-weight:600;display:block;line-height:1.3}
.wk-plus{background:none;border:1px dashed var(--bdr);color:var(--t3);width:100%;padding:2px;border-radius:3px;cursor:pointer;font-size:13px;margin-top:2px}

/* ─── KANBAN ──────────────────────────────────────────────── */
.kb-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
/* on mobile: vertical stacked scroll */
.kb-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.kb-body::-webkit-scrollbar{display:none}
.kb-col{background:var(--bg2);border-radius:var(--r);overflow:hidden}
.kb-hd{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.07)}
.kb-htitle{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.kb-hcnt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.kb-todo .kb-htitle{color:var(--todo)}.kb-todo .kb-hcnt{background:var(--todo-bg);color:var(--todo)}
.kb-prog .kb-htitle{color:var(--prog)}.kb-prog .kb-hcnt{background:var(--prog-bg);color:var(--prog)}
.kb-done .kb-htitle{color:var(--done)}.kb-done .kb-hcnt{background:var(--done-bg);color:var(--done)}
.kb-cards{padding:8px}
.kb-add{
  background:none;border:1.5px dashed var(--bdr);color:var(--t3);
  width:100%;padding:8px;border-radius:var(--r3);cursor:pointer;
  font-size:12px;margin-bottom:7px;font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.kb-add:active{border-color:var(--b);color:var(--b)}
.tk-card{
  background:var(--card);border-radius:var(--r3);padding:11px 12px;
  margin-bottom:6px;cursor:pointer;border:1px solid var(--bdr);
  box-shadow:var(--sh);position:relative;
}
.tk-card:active{transform:scale(.98);opacity:.85}
.tk-ttl{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4;padding-right:22px}
.tk-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tk-pri{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.hi{background:#FDECEA;color:#B83030}
.mi{background:#FEF5E7;color:#C46B0A}
.lo{background:var(--done-bg);color:var(--done)}
.tk-due{font-size:10px;color:var(--t3)}
.tk-due.od{color:var(--red);font-weight:600}
.tk-ev{font-size:9px;color:var(--b);background:#F5E8EC;padding:2px 6px;border-radius:20px;font-weight:600;margin-top:4px;display:inline-block}
.tk-avs{display:flex;position:absolute;top:10px;right:10px}
.tk-notes{font-size:10px;color:var(--t3);margin-top:4px;line-height:1.4;border-top:1px solid var(--bdr);padding-top:4px}

/* ─── MEETINGS ────────────────────────────────────────────── */
.mtg-card{
  background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);
  padding:13px 14px;cursor:pointer;display:flex;gap:12px;margin-bottom:8px;
  box-shadow:var(--sh);
}
.mtg-card:active{transform:scale(.985);opacity:.9}
.mtg-db{width:44px;flex-shrink:0;text-align:center;background:var(--bg);border-radius:var(--r3);padding:7px 4px}
.mtg-dd{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);font-weight:700}
.mtg-dn{font-size:20px;font-weight:300;color:var(--text);line-height:1;margin-top:2px}
.mtg-dm{font-size:9px;color:var(--t3);font-weight:600}
.mtg-body{flex:1;min-width:0}
.mtg-ttl{font-size:13px;font-weight:600;margin-bottom:3px}
.mtg-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.mtg-plc{font-size:11px;color:var(--t3)}
.mtg-nxt{background:var(--bg);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--t2);border-left:3px solid var(--b)}
.mtg-nlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--b);margin-bottom:1px}
.mtg-avs{display:flex;margin-top:6px}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:8px}

/* ─── FUNDRAISING ─────────────────────────────────────────── */
.fr-hero{background:linear-gradient(140deg,var(--b3) 0%,var(--b) 100%);border-radius:var(--r);padding:18px;margin-bottom:14px;color:#fff}
.fr-hl{font-size:10px;font-weight:600;opacity:.55;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.fr-ht{font-size:40px;font-weight:300;line-height:1;margin-bottom:3px}
.fr-ht small{font-size:16px;opacity:.45}
.fr-hs{font-size:11px;opacity:.55;margin-bottom:12px}
.fr-hbar{height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.fr-hfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px}
.fr-stats{display:flex;margin-top:12px}
.fr-st{flex:1;text-align:center}
.fr-sv{font-size:17px;font-weight:600;color:var(--gold);line-height:1}
.fr-sl{font-size:9px;opacity:.45;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.fr-slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:9px}
.fr-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;cursor:pointer;margin-bottom:8px;box-shadow:var(--sh)}
.fr-card:active{transform:scale(.985);opacity:.9}
.fr-ctop{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.fr-cico{width:36px;height:36px;border-radius:9px;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.fr-cinfo{flex:1;min-width:0}
.fr-cttl{font-size:13px;font-weight:600;margin-bottom:1px}
.fr-cdt{font-size:10px;color:var(--t3)}
.fr-camt{text-align:right;flex-shrink:0}
.fr-cr{font-size:17px;font-weight:700;color:var(--green)}
.fr-ctgt{font-size:10px;color:var(--t3)}
.fr-cbar{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.fr-cfill{height:100%;background:linear-gradient(90deg,var(--green),#2ECC71);border-radius:3px}
.fr-cfoot{display:flex;justify-content:space-between;align-items:center}
.fr-cpct{font-size:11px;font-weight:600;color:var(--green)}

/* ─── MEN ─────────────────────────────────────────────────── */
.bday-strip{
  background:linear-gradient(140deg,var(--b3) 0%,var(--b) 100%);
  border-radius:var(--r);padding:11px 12px;margin-bottom:12px;
  display:flex;gap:9px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.bday-strip::-webkit-scrollbar{display:none}
.bday-card{background:rgba(255,255,255,.09);border-radius:var(--r3);padding:9px 12px;flex-shrink:0;text-align:center;min-width:74px}
.bday-n{font-size:10px;font-weight:600;color:#F0E4D0;white-space:nowrap}
.bday-dt{font-size:9px;color:var(--gold);margin-top:1px}
.bday-cnt{font-size:21px;font-weight:300;color:#fff;margin-top:2px;line-height:1}
.bday-lbl{font-size:8px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.6px}
.vtog{display:flex;background:var(--bg2);border-radius:var(--r3);padding:2px;gap:1px}
.vt{background:none;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;color:var(--t3);font-size:13px;transition:all .15s}
.vt.on{background:var(--card);color:var(--text);box-shadow:var(--sh)}
.mem-list{display:flex;flex-direction:column;gap:5px}
.mem-row{
  background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);
  padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;
  box-shadow:var(--sh);
}
.mem-row:active{transform:scale(.985);opacity:.9}
.mem-av{width:38px;height:38px;border-radius:50%;background:var(--b);color:var(--gold);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:13px;font-weight:600}
.mem-sub{font-size:11px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.mem-age{background:var(--bg2);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--t2)}
.mem-rdot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.mem-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.mem-tile{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 10px;text-align:center;cursor:pointer;box-shadow:var(--sh)}
.mem-tile:active{transform:scale(.97);opacity:.9}
.mem-tav{width:46px;height:46px;border-radius:50%;background:var(--b);color:var(--gold);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 7px}
.mem-tname{font-size:12px;font-weight:600;margin-bottom:2px}
.mem-tsub{font-size:10px;color:var(--t3)}
.mem-tbadge{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:700;margin-top:4px;display:inline-block;background:var(--bg2);color:var(--t2)}
.srch{
  display:flex;align-items:center;background:var(--bg2);border-radius:10px;
  padding:9px 12px;gap:8px;
}
.srch svg{width:15px;height:15px;stroke:var(--t3);fill:none;flex-shrink:0;stroke-width:2}
.srch input{background:none;border:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);flex:1;min-width:0}
.srch input::placeholder{color:var(--t3)}

/* ─── MODAL ───────────────────────────────────────────────── */
/* pure overlay — covers entire viewport including top+bottom bars */
.ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(20,8,5,.65);
  display:none;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.ov.on{display:block}

/* bottom sheet */
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:201;
  background:var(--card);
  border-radius:20px 20px 0 0;
  display:none;flex-direction:column;
  max-height:88vh;
  box-shadow:var(--sh3);
  padding-bottom:var(--si-bot);
}
.sheet.on{display:flex}
.sheet-drag{width:38px;height:4px;background:var(--bdr2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px 10px;flex-shrink:0;
}
.sheet-hdr h2{font-family:'Playfair Display',serif;font-size:19px;font-weight:500}
.sheet-x{
  background:var(--bg2);border:none;
  width:28px;height:28px;border-radius:50%;
  cursor:pointer;font-size:14px;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
}
.sheet-x:active{background:var(--bdr)}
.sheet-body{overflow-y:auto;padding:0 18px 10px;flex:1;-webkit-overflow-scrolling:touch}
.sheet-body::-webkit-scrollbar{display:none}
.flds{display:flex;flex-direction:column;gap:12px}
.frow{display:flex;gap:10px}
.frow .f{flex:1}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t2)}
.f input,.f select,.f textarea{
  border:1.5px solid var(--bdr);border-radius:var(--r3);
  padding:11px 13px;font-family:'Inter',sans-serif;font-size:15px;
  color:var(--text);background:var(--bg);outline:none;width:100%;
  -webkit-appearance:none;transition:border-color .15s;
}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--b);background:var(--card)}
.f textarea{min-height:64px;resize:none;line-height:1.5}
.mpc{display:flex;flex-wrap:wrap;gap:6px}
.mp{
  display:flex;align-items:center;gap:5px;
  padding:7px 12px 7px 7px;border-radius:22px;
  background:var(--bg);border:1.5px solid var(--bdr);
  cursor:pointer;font-size:12px;font-weight:500;user-select:none;
  transition:all .15s;
}
.mp:active{transform:scale(.94)}
.mp.on{background:var(--b);border-color:var(--b);color:#fff}
.mp-av{width:18px;height:18px;border-radius:50%;background:var(--b2);color:var(--gold);font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mp.on .mp-av{background:rgba(255,255,255,.2);color:#fff}
.ck{display:flex;align-items:center;gap:9px;padding:2px 0}
.ck input[type=checkbox]{width:18px;height:18px;accent-color:var(--b);flex-shrink:0;cursor:pointer}
.ck label{font-size:14px;font-weight:500;color:var(--text);cursor:pointer}
.sheet-ftr{
  display:flex;gap:8px;padding:12px 18px;
  border-top:1px solid var(--bdr);flex-shrink:0;
}
.btn-d{background:none;color:var(--red);border:1.5px solid var(--red);padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
.btn-d:active{background:var(--red-bg)}
.btn-c{background:var(--bg2);color:var(--t2);border:none;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.btn-s{background:var(--b);color:#fff;border:none;padding:11px 0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;flex:1}
.btn-s:active{background:var(--b2)}

/* ─── ADD SHEET ───────────────────────────────────────────── */
.add-sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:300;
  background:var(--card);border-radius:20px 20px 0 0;
  display:none;padding:10px 16px;
  padding-bottom:calc(16px + var(--si-bot));
  box-shadow:var(--sh3);
}
.add-sheet.on{display:block}
.add-drag{width:38px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 12px}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ao{
  background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:14px 12px;cursor:pointer;display:flex;flex-direction:column;gap:3px;
}
.ao:active{border-color:var(--b);background:var(--card);transform:scale(.97)}
.ao-ico{font-size:22px}
.ao-lbl{font-size:13px;font-weight:700;color:var(--text)}
.ao-sub{font-size:10px;color:var(--t3)}

/* ─── PASSWORD ────────────────────────────────────────────── */
#pw{
  position:fixed;inset:0;z-index:999;
  background:var(--b3);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
#pw.gone{display:none}
.pw-box{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:310px}
.pw-logo{width:74px;height:74px;background:rgba(255,255,255,.06);border-radius:22px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.1)}
.pw-title{font-family:'Playfair Display',serif;font-size:21px;color:#F0E4D0;font-weight:500;text-align:center;line-height:1.35}
.pw-sub{font-size:12px;color:rgba(240,228,208,.38);text-align:center;margin-top:-10px}
.pw-in{
  width:100%;background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.11);border-radius:12px;
  padding:14px 18px;font-family:'Inter',sans-serif;font-size:17px;
  color:#F0E4D0;outline:none;text-align:center;letter-spacing:4px;
  -webkit-appearance:none;
}
.pw-in::placeholder{letter-spacing:0;font-size:14px;color:rgba(240,228,208,.28)}
.pw-in:focus{border-color:var(--gold)}
.pw-btn{
  width:100%;background:var(--gold);color:var(--b3);border:none;
  border-radius:12px;padding:14px;font-family:'Inter',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;
}
.pw-btn:active{background:var(--gold2);transform:scale(.97)}
.pw-err{font-size:12px;color:#FF8A80;text-align:center;min-height:16px}

/* ─── LOADING ─────────────────────────────────────────────── */
#dbl{position:fixed;inset:0;z-index:998;background:var(--b3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#dbl.gone{display:none}
.dbl-spin{width:28px;height:28px;border:2.5px solid rgba(201,169,110,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dbl-txt{font-size:12px;color:rgba(240,228,208,.35)}

/* ─── EMPTY ───────────────────────────────────────────────── */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty-ico{font-size:44px;margin-bottom:10px;opacity:.22}
.empty-txt{font-size:13px;font-weight:500}

/* ─── DESKTOP ─────────────────────────────────────────────── */
@media(min-width:640px){
  body{
    padding-top:0;padding-bottom:0;
    flex-direction:row;height:100vh;
  }
  #topbar{
    position:static;height:100vh;width:64px;
    flex-direction:column;justify-content:flex-start;
    padding:16px 0 16px;border-bottom:none;
    border-right:1px solid rgba(255,255,255,.07);
    gap:0;overflow:hidden;
  }
  .topbar-logo{flex-direction:column;gap:0;padding:10px 0 16px;justify-content:center;width:100%;border-bottom:1px solid rgba(255,255,255,.08)}
  .topbar-logo svg{width:32px;height:32px}
  .topbar-name{display:none}
  .topbar-add{display:none}
  #botnav{
    position:static;height:100%;width:64px;flex-direction:column;
    border-top:none;border-right:1px solid rgba(255,255,255,.07);
    padding:12px 0;justify-content:flex-start;gap:2px;
  }
  .nt{padding:12px 0;border-radius:10px;margin:0 8px}
  .nt-lbl{display:none}
  #app{flex:1;border-left:none}
  .sheet{
    position:fixed;top:50%;left:50%;right:auto;bottom:auto;
    transform:translate(-50%,-50%);
    border-radius:18px;width:min(92vw,520px);max-height:86vh;
    padding-bottom:0;
  }
  .sheet-drag{display:none}
  .add-sheet{
    position:fixed;top:50%;left:50%;right:auto;bottom:auto;
    transform:translate(-50%,-50%);
    border-radius:16px;width:min(90vw,420px);
    padding:16px;
  }
  .add-drag{display:none}
}
</style>

  const col=(items,sta,cls)=>`<div class="kb-col ${cls}"><div class="kb-hd"><span class="kb-htitle">${STA[sta].l}</span><span class="kb-hcnt">${items.length}</span></div><div class="kb-cards"><button class="kb-add" onclick="newTkSta('${sta}')">＋ Add task</button>${items.length?items.map(card).join(''):'<div style="text-align:center;padding:14px;font-size:11px;color:var(--t3)">Nothing here</div>'}</div></div>`;
  return`<div class="kb-wrap">
    <div class="pill-strip">${pills}</div>
    <div class="kb-body">${col(todo,'todo','kb-todo')}${col(prog,'prog','kb-prog')}${col(done,'done','kb-done')}</div>
  </div>`;
}

// ── MEETINGS ───────────────────────────────────────────────
function mtgHTML(){
  const now=new Date().toISOString().slice(0,10);
  const up=events.filter(e=>e.isMtg&&e.date>=now).sort((a,b)=>a.date.localeCompare(b.date));
  const pa=events.filter(e=>e.isMtg&&e.date<now).sort((a,b)=>b.date.localeCompare(a.date));
  const card=e=>{
    const[y,m,d]=e.date.split('-'),t=tc(e.type),dd=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
    return`<div class="mtg-card" onclick="openEv('${e.id}')"><div class="mtg-db"><div class="mtg-dd">${D[dd.getDay()].slice(0,3)}</div><div class="mtg-dn">${parseInt(d)}</div><div class="mtg-dm">${MS[parseInt(m)-1]}</div></div><div class="mtg-body"><div class="mtg-ttl">${e.title}</div><div class="mtg-meta"><span class="ag-tag" style="background:${t.bg};color:${t.c}">${t.l}</span>${e.place?`<span class="mtg-plc">📍 ${e.place}</span>`:''}</div>${e.next?`<div class="mtg-nxt"><div class="mtg-nlbl">Next steps</div>${e.next}</div>`:''} ${e.men&&e.men.length?`<div class="mtg-avs">${e.men.map(id=>avH(id,24)).join('')}</div>`:''}</div></div>`;
  };
  return`<div class="pg">
    <div class="pg-hdr"><span class="pg-title">Meetings</span></div>
    <div class="scrl pad">
      ${up.length?`<div class="slbl">Upcoming</div>${up.map(card).join('')}`:''}
      ${pa.length?`<div class="slbl" style="margin-top:14px;opacity:.55">Past</div><div style="opacity:.5">${pa.map(card).join('')}</div>`:''}
      ${!events.filter(e=>e.isMtg).length?'<div class="empty"><div class="empty-ico">🤝</div><div class="empty-txt">No meetings yet</div></div>':''}
    </div>
  </div>`;
}

// ── FUNDRAISING ────────────────────────────────────────────
function frHTML(){
  const frs=events.filter(e=>(parseFloat(e.fT)||0)>0);
  let tt=0,tr=0;frs.forEach(e=>{tt+=parseFloat(e.fT)||0;tr+=parseFloat(e.fR)||0});
  const pct=tt>0?Math.min(100,tr/tt*100):0;
  const ico={fundraiser:'🎪',special:'⭐',retreat:'🏔',meeting:'🤝',mass:'⛪',worship:'🎶'};
  return`<div class="pg">
    <div class="pg-hdr"><span class="pg-title">Fundraising</span></div>
    <div class="scrl pad">
      <div class="fr-hero">
        <div class="fr-hl">Total Raised</div>
        <div class="fr-ht"><small>R</small>${tr.toLocaleString()}</div>
        <div class="fr-hs">of R${tt.toLocaleString()} target — ${pct.toFixed(0)}% achieved</div>
        <div class="fr-hbar"><div class="fr-hfill" style="width:${pct}%"></div></div>
        <div class="fr-stats">
          <div class="fr-st"><div class="fr-sv">R${(tt-tr).toLocaleString()}</div><div class="fr-sl">Remaining</div></div>
          <div class="fr-st"><div class="fr-sv">${frs.length}</div><div class="fr-sl">Projects</div></div>
          <div class="fr-st"><div class="fr-sv">${pct.toFixed(0)}%</div><div class="fr-sl">Complete</div></div>
        </div>
      </div>
      <div class="fr-slbl">Active Projects</div>
      ${frs.length?frs.map(e=>{
        const tgt=parseFloat(e.fT)||0,rsd=parseFloat(e.fR)||0,p=tgt>0?Math.min(100,rsd/tgt*100):0;
        return`<div class="fr-card" onclick="openEv('${e.id}')"><div class="fr-ctop"><div class="fr-cico">${ico[e.type]||'💰'}</div><div class="fr-cinfo"><div class="fr-cttl">${e.title}</div><div class="fr-cdt">📅 ${fmtD(e.date)}${e.place?' · 📍 '+e.place:''}</div></div><div class="fr-camt"><div class="fr-cr">R${rsd.toLocaleString()}</div><div class="fr-ctgt">of R${tgt.toLocaleString()}</div></div></div><div class="fr-cbar"><div class="fr-cfill" style="width:${p}%"></div></div><div class="fr-cfoot"><div class="fr-cpct">${p.toFixed(0)}% raised</div>${e.men&&e.men.length?`<div style="display:flex">${e.men.map(id=>avH(id,20)).join('')}</div>`:''}</div></div>`;
      }).join(''):'<div class="empty"><div class="empty-ico">💰</div><div class="empty-txt">No projects yet</div></div>'}
    </div>
  </div>`;
}

// ── MEN ────────────────────────────────────────────────────
function menHTML(){
  const today=new Date();
  const fil=men.filter(m=>!menQ||m.name.toLowerCase().includes(menQ.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name));
  const bdays=men.map(m=>{
    if(!m.dob)return null;
    const[y,mo,d]=m.dob.split('-').map(Number);
    let bd=new Date(today.getFullYear(),mo-1,d);
    if(bd<today)bd=new Date(today.getFullYear()+1,mo-1,d);
    return{...m,bd,diff:Math.ceil((bd-today)/864e5)};
  }).filter(Boolean).sort((a,b)=>a.diff-b.diff).slice(0,7);

  const listR=m=>{
    const a=age(m.dob),mt=tasksFor(m.id),hi=mt.filter(t=>t.pri==='high'&&t.sta!=='done').length;
    return`<div class="mem-row" onclick="openMn('${m.id}')"><div class="mem-av">${ini(m.name)}</div><div class="mem-info"><div class="mem-name">${m.name}</div><div class="mem-sub">${m.trade||'No trade'}${m.dob?' · '+fmtD(m.dob):''}</div></div><div class="mem-right">${hi?'<div class="mem-rdot"></div>':''} ${a!==null?`<div class="mem-age">${a} yrs</div>`:''}</div></div>`;
  };
  const tileR=m=>{
    const a=age(m.dob),mt=tasksFor(m.id).filter(t=>t.sta!=='done').length;
    return`<div class="mem-tile" onclick="openMn('${m.id}')"><div class="mem-tav">${ini(m.name)}</div><div class="mem-tname">${m.name}</div><div class="mem-tsub">${m.trade||''}${a!==null?'<br>'+a+' yrs':''}</div>${mt?`<div class="mem-tbadge">${mt} task${mt>1?'s':''}</div>`:''}</div>`;
  };

  return`<div class="pg">
    <div class="pg-hdr">
      <span class="pg-title">Men <span style="font-size:13px;font-weight:400;color:var(--t3)">${men.length}</span></span>
      <div class="vtog"><button class="vt${menV==='list'?' on':''}" onclick="menV='list';render()">☰</button><button class="vt${menV==='tile'?' on':''}" onclick="menV='tile';render()">⊞</button></div>
    </div>
    <div style="padding:9px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--card)">
      <div class="srch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Search men..." value="${menQ}" oninput="menQ=this.value;render()"></div>
    </div>
    <div class="scrl pad">
      <div class="bday-strip">${bdays.map(m=>`<div class="bday-card"><div class="bday-n">${m.name.split(' ')[0]}</div><div class="bday-dt">${m.bd.getDate()} ${MS[m.bd.getMonth()]}</div><div class="bday-cnt">${m.diff}</div><div class="bday-lbl">days</div></div>`).join('')}</div>
      <div class="${menV==='tile'?'mem-tiles':'mem-list'}">${fil.map(menV==='tile'?tileR:listR).join('')}${!fil.length?'<div class="empty"><div class="empty-ico">👥</div><div class="empty-txt">No men found</div></div>':''}</div>
    </div>
  </div>`;
}

window.newEv=()=>{editEv=null;showEvSheet({})};

function showEvSheet(ev){
  document.getElementById('ev-h').textContent=editEv?'Edit Event':'New Event';
  const aids=ev.men||[];
  document.getElementById('ev-flds').innerHTML=
    `<div class="frow"><div class="f" style="flex:2"><label>Title *</label><input id="et" value="${esc(ev.title)}" placeholder="Event name"></div><div class="f"><label>Date *</label><input id="ed" type="date" value="${ev.date||''}"></div></div>`+
    `<div class="frow"><div class="f"><label>Type</label><select id="ety">${Object.entries(TC).map(([k,v])=>`<option value="${k}"${ev.type===k?' selected':''}>${v.l}</option>`).join('')}</select></div><div class="f"><label>Time</label><input id="etm" type="time" value="${ev.time||''}"></div></div>`+
    `<div class="f"><label>Place</label><input id="ep" value="${esc(ev.place)}" placeholder="Venue"></div>`+
    `<div class="f"><label>Description</label><textarea id="ede">${esc2(ev.desc)}</textarea></div>`+
    `<div class="f"><label>Next Steps</label><textarea id="ene">${esc2(ev.next)}</textarea></div>`+
    `<div class="frow"><div class="f"><label>FR Target (R)</label><input id="eft" type="number" value="${ev.fT||0}"></div><div class="f"><label>FR Raised (R)</label><input id="efr" type="number" value="${ev.fR||0}"></div></div>`+
    `<div class="f"><label>Assigned Men</label><div class="mpc" id="epc">${men.map(m=>`<div class="mp${aids.includes(m.id)?' on':''}" data-mid="${m.id}" onclick="this.classList.toggle('on')"><div class="mp-av">${ini(m.name)}</div>${m.name.split(' ')[0]}</div>`).join('')}</div></div>`+
    `<div class="f"><div class="ck"><input type="checkbox" id="emtg"${ev.isMtg?' checked':''}><label for="emtg">Show in Meetings</label></div></div>`;
  document.getElementById('ev-ftr').innerHTML=`${editEv?`<button class="btn-d" onclick="delEv('${editEv.id}')">Delete</button>`:''}<button class="btn-c" onclick="closeSheet('ev-sheet')">Cancel</button><button class="btn-s" onclick="saveEv()">Save</button>`;
  openSheet('ev-sheet');
}

window.saveEv=async()=>{
  const title=document.getElementById('et').value.trim(),date=document.getElementById('ed').value;
  if(!title||!date){alert('Title and date required');return}
  const mids=[...document.querySelectorAll('#epc .mp.on')].map(el=>el.dataset.mid);
  const data={title,date,time:document.getElementById('etm').value,place:document.getElementById('ep').value,type:document.getElementById('ety').value,desc:document.getElementById('ede').value,next:document.getElementById('ene').value,fT:parseFloat(document.getElementById('eft').value)||0,fR:parseFloat(document.getElementById('efr').value)||0,men:mids,isMtg:document.getElementById('emtg').checked};
  if(editEv){Object.assign(editEv,data);fbUp('events',editEv);}
  else{const id=uid();events.push({id,...data});fbAdd('events',{id,...data});}
  closeSheet('ev-sheet');render();
};
window.delEv=async id=>{if(!confirm('Delete this event?'))return;fbDel('events',id);events=events.filter(e=>e.id!==id);closeSheet('ev-sheet');render()};

window.openTk=id=>{editTk=tasks.find(t=>t.id===id);showTkSheet(editTk||{})};
window.newTk=()=>{editTk=null;showTkSheet({})};

function showTkSheet(t){
  document.getElementById('tk-h').textContent=editTk?'Edit Task':'New Task';
  const aids=t.men||[];
  const evOpts='<option value="">None</option>'+events.map(e=>`<option value="${e.id}"${t.evId===e.id?' selected':''}>${e.title} (${fmtD(e.date)})</option>`).join('');
  document.getElementById('tk-flds').innerHTML=

    `<div class="frow"><div class="f"><label>Due Date</label><input id="td" type="date" value="${t.due||''}"></div><div class="f"><label>Priority</label><select id="tp"><option value="high"${t.pri==='high'?' selected':''}>High</option><option value="mid"${!t.pri||t.pri==='mid'?' selected':''}>Medium</option><option value="low"${t.pri==='low'?' selected':''}>Low</option></select></div></div>`+
    `<div class="f"><label>Status</label><select id="ts"><option value="todo"${!t.sta||t.sta==='todo'?' selected':''}>To Do</option><option value="prog"${t.sta==='prog'?' selected':''}>In Progress</option><option value="done"${t.sta==='done'?' selected':''}>Done</option></select></div>`+

window.saveTk=async()=>{

// ── FIREBASE ───────────────────────────────────────────────
async function fbUp(col,item){if(!window._dbReady)return;try{const{doc:d,updateDoc:u}=window._fb;const{id,...dd}=item;await u(d(window._db,col,id),dd)}catch(e){console.warn(e)}}
async function fbAdd(col,item){if(!window._dbReady)return;try{const{collection:c,addDoc:a}=window._fb;await a(c(window._db,col),item)}catch(e){console.warn(e)}}
async function fbDel(col,id){if(!window._dbReady)return;try{const{doc:d,deleteDoc:del}=window._fb;await del(d(window._db,col,id))}catch(e){console.warn(e)}}

// ── BOOT ───────────────────────────────────────────────────
async function boot(){
  document.getElementById('dbl').classList.remove('gone');
  try{
    if(!window._dbReady)await new Promise(res=>window.addEventListener('dbready',res,{once:true}));
    const{collection:c,getDocs,addDoc:a}=window._fb;const db=window._db;
    const[es,ts,ms]=await Promise.all([getDocs(c(db,'events')),getDocs(c(db,'tasks')),getDocs(c(db,'members'))]);
    if(!es.empty)events=es.docs.map(d=>({id:d.id,...d.data()}));
    else for(const e of events){const{id,...d}=e;await a(c(db,'events'),{id,...d})}
    if(!ts.empty)tasks=ts.docs.map(d=>({id:d.id,...d.data()}));
    else for(const t of tasks){const{id,...d}=t;await a(c(db,'tasks'),{id,...d})}
    if(!ms.empty)men=ms.docs.map(d=>({id:d.id,...d.data()}));
    else for(const m of men){const{id,...d}=m;await a(c(db,'members'),{id,...d})}
  }catch(e){console.warn('Firebase offline, running local',e)}
  document.getElementById('dbl').classList.add('gone');
  render();
}

// ── PASSWORD ───────────────────────────────────────────────
window.checkPw=()=>{
  const v=document.getElementById('pw-in').value;
  if(v===PWD){sessionStorage.setItem('cmm_auth','1');document.getElementById('pw').classList.add('gone');boot();}
  else{document.getElementById('pw-err').textContent='Incorrect password';document.getElementById('pw-in').value='';document.getElementById('pw-in').focus();}
};

if(sessionStorage.getItem('cmm_auth')==='1'){document.getElementById('pw').classList.add('gone');boot();}
else setTimeout(()=>document.getElementById('pw-in').focus(),300);
</script>
