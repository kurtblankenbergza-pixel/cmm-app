<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">

<title>Holy Redeemer CMM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<script type="module">

const app=initializeApp(FB);const db=getFirestore(app);
window._db=db;window._fb={collection,getDocs,addDoc,doc,updateDoc,deleteDoc};
window._dbReady=true;window.dispatchEvent(new Event('dbready'));

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b:#7B1230;--b2:#5C0D23;--b3:#3D0818;
  --gold:#C9A96E;--gold2:#E8C98A;
  --bg:#F7F4F1;--bg2:#EEEAE5;--card:#fff;
  --text:#1A1118;--text2:#6B5F68;--text3:#A89EA6;
  --border:#E2D8DC;--border2:#D4C4CA;
  --green:#1E7A4A;--red:#C0392B;--red-bg:#FAEAEA;
  --todo:#3B5BDB;--todo-bg:#EEF2FF;
  --prog:#D97706;--prog-bg:#FFF7E6;
  --done:#1E7A4A;--done-bg:#E8F5EE;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow2:0 -2px 20px rgba(0,0,0,.12);
  /* safe areas for iPhone notch/home bar */
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --bar-h:60px;
  --hdr-h:56px;
}

html{height:100%;background:var(--b3)}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  /* push content above bottom bar */
  padding-bottom:calc(var(--bar-h) + var(--safe-bottom));
}

/* ── TOP BAR ── */
.top-bar{
  background:var(--b3);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  height:calc(var(--hdr-h) + var(--safe-top));
  padding-top:var(--safe-top);
  flex-shrink:0;
  position:sticky;top:0;z-index:100;
}
.top-bar-logo{display:flex;align-items:center;gap:9px}
.top-bar-logo svg{width:32px;height:32px;flex-shrink:0}
.top-bar-name{font-family:'Playfair Display',serif;font-size:16px;color:#F0E6D0;font-weight:500;letter-spacing:.2px}
.top-bar-right{display:flex;align-items:center;gap:8px}
.top-bar-add{
  background:var(--gold);color:var(--b3);border:none;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;
  padding:8px 18px;border-radius:22px;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:background .15s;letter-spacing:.2px;
}
.top-bar-add:active{background:var(--gold2);transform:scale(.97)}
.top-bar-add svg{width:14px;height:14px;stroke:var(--b3);stroke-width:2.5;fill:none}

/* ── BOTTOM NAV BAR ── */
.bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  height:calc(var(--bar-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--b3);
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;
  z-index:100;
  box-shadow:var(--shadow2);
}
.tab{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;
  color:rgba(240,230,208,.38);transition:color .2s;
  padding:8px 0;position:relative;
  font-family:'Inter',sans-serif;
}
.tab.active{color:var(--gold)}
.tab-ico{
  width:26px;height:26px;display:flex;align-items:center;
  justify-content:center;border-radius:8px;transition:background .2s;
  position:relative;
}
.tab.active .tab-ico{background:rgba(201,169,110,.15)}
.tab-ico svg{width:22px;height:22px;stroke-width:1.8;fill:none;transition:stroke .2s}
.tab.active .tab-ico svg{stroke-width:2.2}
.tab-lbl{font-size:10px;font-weight:600;letter-spacing:.3px}
.tab-badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;
  min-width:16px;height:16px;
  border-radius:8px;padding:0 4px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--b3);
  line-height:1;
}

/* ── PAGE WRAPPER ── */
.page{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* ── PAGE HEADER (inside each module) ── */
.page-hdr{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--card);
  position:sticky;top:0;z-index:10;
}
.page-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;flex:1}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll::-webkit-scrollbar{display:none}
.pad{padding:14px 16px}

/* ── PILL TABS (sub-nav) ── */
.pills{
  display:flex;gap:7px;overflow-x:auto;
  padding:10px 16px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--card);
  scrollbar-width:none;
}
.pills::-webkit-scrollbar{display:none}
.pill{
  background:none;border:1.5px solid var(--border);
  color:var(--text2);font-family:'Inter',sans-serif;
  font-size:12px;font-weight:600;padding:7px 16px;
  border-radius:22px;cursor:pointer;white-space:nowrap;
  transition:all .15s;flex-shrink:0;
}
.pill.active{background:var(--b);border-color:var(--b);color:#fff}
.pill:active{transform:scale(.95)}

/* ── CAL NAV ── */
.cal-nav{
  display:flex;align-items:center;padding:10px 16px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--card);gap:10px;
}
.cal-nav-btn{
  width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);
  background:none;color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.cal-nav-btn:active{border-color:var(--b);color:var(--b);transform:scale(.92)}
.cal-nav-lbl{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;flex:1;text-align:center}
.today-pill{background:none;border:1.5px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;padding:5px 12px;border-radius:22px;cursor:pointer;white-space:nowrap}
.today-pill:active{border-color:var(--b);color:var(--b)}

/* ── AGENDA ── */
.ag-section{margin-bottom:22px}
.ag-month{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.ag-day{display:flex;gap:12px;margin-bottom:2px}
.ag-date-col{width:42px;flex-shrink:0;text-align:right;padding-top:3px}
.ag-num{font-size:22px;font-weight:300;color:var(--text2);line-height:1}
.ag-dayname{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600;margin-top:2px}
.ag-date-col.tod .ag-num{color:var(--b);font-weight:700}
.ag-events-col{flex:1;border-left:2px solid var(--border);padding-left:12px;padding-bottom:14px}
.ag-card{background:var(--card);border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);display:flex;gap:10px;transition:transform .1s}
.ag-card:active{transform:scale(.98)}
.ag-color{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:30px}
.ag-content{flex:1;min-width:0}
.ag-title{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.3}
.ag-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ag-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.ag-place{font-size:11px;color:var(--text3)}
.ag-next{font-size:11px;color:var(--text2);margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:6px;border-left:3px solid}
.ag-next-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.ag-fr{margin-top:7px}
.ag-fr-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:2px}
.ag-fr-val{color:var(--green);font-weight:600}
.ag-fr-track{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.ag-fr-fill{height:100%;background:linear-gradient(90deg,var(--green),#27AE60);border-radius:2px}
.ag-avs{display:flex;flex-shrink:0;align-items:flex-start}
.av{width:24px;height:24px;border-radius:50%;background:var(--b);color:var(--gold);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);margin-left:-6px;flex-shrink:0}
.av:first-child{margin-left:0}

/* ── MONTH ── */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden}
.dh{background:var(--card);text-align:center;padding:8px 2px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
.dc{background:var(--card);min-height:68px;padding:5px 4px;cursor:pointer;position:relative}
.dc:active{background:var(--bg2)}
.dc.om{background:#faf8f6;opacity:.5}
.dc.tod .dn{background:var(--b);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px}
.dn{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.ec{font-size:9px;padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;line-height:1.4}
.ec-more{font-size:9px;color:var(--text3);padding:0 2px;font-weight:500}

/* ── WEEK ── */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wk-col{background:var(--card);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.wk-col.tod{border-color:var(--b);border-width:2px}
.wk-hd{padding:7px 4px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg)}
.wk-dn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.wk-dd{font-size:17px;font-weight:300;color:var(--text);margin-top:2px}
.wk-col.tod .wk-dd{color:var(--b);font-weight:600}
.wk-evts{padding:5px;min-height:70px}
.wk-chip{padding:4px 5px;border-radius:4px;margin-bottom:3px;cursor:pointer;font-size:9px;font-weight:600;display:block;line-height:1.3}
.wk-add-btn{background:none;border:1px dashed var(--border);color:var(--text3);width:100%;padding:3px;border-radius:4px;cursor:pointer;font-size:14px;margin-top:3px}

/* ── KANBAN ── */
.kanban-body{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.kanban{display:flex;gap:10px;flex:1;overflow-x:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-height:0;align-items:flex-start}
.kanban::-webkit-scrollbar{display:none}
.kb-col{background:var(--bg2);border-radius:12px;overflow:hidden;width:240px;max-width:76vw;flex-shrink:0;display:flex;flex-direction:column;max-height:100%}
.kb-hd{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.06)}
.kb-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.kb-cnt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.kb-todo .kb-title{color:var(--todo)}.kb-todo .kb-cnt{background:var(--todo-bg);color:var(--todo)}
.kb-prog .kb-title{color:var(--prog)}.kb-prog .kb-cnt{background:var(--prog-bg);color:var(--prog)}
.kb-done .kb-title{color:var(--done)}.kb-done .kb-cnt{background:var(--done-bg);color:var(--done)}
.kb-cards{overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch;flex:1;scrollbar-width:none;max-height:calc(100vh - 260px)}
.kb-cards::-webkit-scrollbar{display:none}
.kb-add-btn{background:none;border:1px dashed var(--border);color:var(--text3);width:100%;padding:8px;border-radius:8px;cursor:pointer;font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:4px}
.kb-add-btn:active{border-color:var(--b);color:var(--b)}
.task-card{background:var(--card);border-radius:10px;padding:11px 12px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);position:relative;transition:transform .1s}
.task-card:active{transform:scale(.97)}
.task-title{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4;padding-right:20px}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.task-pri{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.pri-high{background:#FDECEA;color:#C0392B}
.pri-mid{background:#FEF3CD;color:#D97706}
.pri-low{background:var(--done-bg);color:var(--done)}
.task-due{font-size:10px;color:var(--text3)}
.task-due.od{color:var(--red);font-weight:600}
.task-ev{font-size:9px;color:var(--b);background:#F8E8ED;padding:2px 6px;border-radius:20px;font-weight:600;margin-top:4px;display:inline-block}
.task-avs{display:flex;position:absolute;top:11px;right:10px}
.task-notes{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.4;border-top:1px solid var(--border);padding-top:4px}

/* ── MEETINGS ── */
.mtg-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;display:flex;gap:12px;margin-bottom:8px;transition:transform .1s}
.mtg-card:active{transform:scale(.98)}
.mtg-date-block{width:46px;flex-shrink:0;text-align:center;background:var(--bg);border-radius:8px;padding:7px 4px}
.mtg-day{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:700}
.mtg-num{font-size:22px;font-weight:300;color:var(--text);line-height:1;margin-top:2px}
.mtg-mon{font-size:9px;color:var(--text3);font-weight:600}
.mtg-body{flex:1;min-width:0}
.mtg-title{font-size:14px;font-weight:600;margin-bottom:4px}
.mtg-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.mtg-place{font-size:11px;color:var(--text3)}
.mtg-next-box{background:var(--bg);border-radius:6px;padding:6px 9px;font-size:11px;color:var(--text2);border-left:3px solid var(--b)}
.mtg-next-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--b);margin-bottom:1px}
.mtg-avs{display:flex;margin-top:7px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px}

/* ── FUNDRAISING ── */
.fr-hero{background:linear-gradient(135deg,var(--b3),var(--b));border-radius:16px;padding:20px;margin-bottom:16px;color:#fff}
.fr-hero-lbl{font-size:10px;font-weight:600;opacity:.6;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.fr-hero-total{font-size:42px;font-weight:300;line-height:1;margin-bottom:3px}
.fr-hero-total small{font-size:16px;opacity:.5}
.fr-hero-sub{font-size:12px;opacity:.6;margin-bottom:14px}
.fr-hero-bar{height:7px;background:rgba(255,255,255,.18);border-radius:4px;overflow:hidden}
.fr-hero-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px}
.fr-stats{display:flex;margin-top:14px}
.fr-stat{flex:1;text-align:center}
.fr-sv{font-size:18px;font-weight:600;color:var(--gold);line-height:1}
.fr-sl{font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.fr-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px}
.fr-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;margin-bottom:8px;transition:transform .1s}
.fr-card:active{transform:scale(.98)}
.fr-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.fr-card-ico{width:38px;height:38px;border-radius:10px;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.fr-card-info{flex:1;min-width:0}
.fr-card-title{font-size:14px;font-weight:600;margin-bottom:2px}
.fr-card-date{font-size:11px;color:var(--text3)}
.fr-card-amt{text-align:right;flex-shrink:0}
.fr-card-raised{font-size:18px;font-weight:700;color:var(--green)}
.fr-card-target{font-size:10px;color:var(--text3)}
.fr-card-bar{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:7px}
.fr-card-fill{height:100%;background:linear-gradient(90deg,var(--green),#27AE60);border-radius:3px}
.fr-card-foot{display:flex;justify-content:space-between;align-items:center}
.fr-card-pct{font-size:11px;font-weight:600;color:var(--green)}

/* ── MEN ── */
.bday-strip{background:linear-gradient(135deg,var(--b3),var(--b));border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.bday-strip::-webkit-scrollbar{display:none}
.bday-card{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;flex-shrink:0;text-align:center;min-width:78px}
.bday-name{font-size:10px;font-weight:600;color:#F0E6D0;white-space:nowrap}
.bday-dt{font-size:9px;color:var(--gold);margin-top:1px}
.bday-n{font-size:20px;font-weight:300;color:#fff;margin-top:3px;line-height:1}
.bday-nl{font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.6px}
.view-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:8px;padding:2px;gap:1px}
.vt{background:none;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;color:rgba(240,230,208,.5);font-size:13px;transition:all .15s}
.vt.active{background:rgba(255,255,255,.15);color:#F0E6D0}
.mem-list{display:flex;flex-direction:column;gap:6px}
.mem-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:transform .1s}
.mem-row:active{transform:scale(.98)}
.mem-av{width:40px;height:40px;border-radius:50%;background:var(--b);color:var(--gold);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:14px;font-weight:600}
.mem-sub{font-size:11px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.mem-age-badge{background:var(--bg2);border-radius:20px;padding:3px 9px;font-size:10px;font-weight:600;color:var(--text2)}
.mem-task-dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.mem-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.mem-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 12px;text-align:center;cursor:pointer;transition:transform .1s}
.mem-tile:active{transform:scale(.97)}
.mem-tile-av{width:48px;height:48px;border-radius:50%;background:var(--b);color:var(--gold);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.mem-tile-name{font-size:13px;font-weight:600;margin-bottom:2px}
.mem-tile-sub{font-size:10px;color:var(--text3)}
.mem-tbadge{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:700;margin-top:4px;display:inline-block}

/* ── SEARCH BAR ── */
.search-bar{display:flex;align-items:center;background:var(--bg2);border-radius:10px;padding:9px 12px;gap:8px;margin:0}
.search-bar svg{width:16px;height:16px;stroke:var(--text3);fill:none;flex-shrink:0;stroke-width:2}
.search-bar input{background:none;border:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);flex:1}
.search-bar input::placeholder{color:var(--text3)}

/* ── MODAL (bottom sheet) ── */
.overlay{position:fixed;inset:0;background:rgba(26,17,24,.6);z-index:200;display:none;backdrop-filter:blur(4px)}
.overlay.on{display:block}
.modal{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-radius:20px 20px 0 0;
  max-height:90vh;
  display:none;flex-direction:column;
  z-index:201;
  box-shadow:0 -4px 30px rgba(0,0,0,.18);
  padding-bottom:var(--safe-bottom);
}
.modal.on{display:flex}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 10px}
.modal-hdr h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:500}
.modal-x{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-scroll{overflow-y:auto;padding:0 18px 16px;flex:1;-webkit-overflow-scrolling:touch}
.modal-scroll::-webkit-scrollbar{display:none}
.modal-fields{display:flex;flex-direction:column;gap:13px}
.frow{display:flex;gap:10px}
.frow .fld{flex:1}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text2)}
.fld input,.fld select,.fld textarea{
  border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;font-family:'Inter',sans-serif;font-size:15px;
  color:var(--text);background:var(--bg);outline:none;width:100%;
  -webkit-appearance:none;transition:border .15s;
}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--b);background:var(--card)}
.fld textarea{min-height:70px;resize:none;line-height:1.5}
.mpicker{display:flex;flex-wrap:wrap;gap:6px}
.mpick{display:flex;align-items:center;gap:5px;padding:7px 12px 7px 8px;border-radius:22px;background:var(--bg);border:1.5px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;user-select:none;transition:all .15s}
.mpick:active{transform:scale(.95)}
.mpick.sel{background:var(--b);border-color:var(--b);color:#fff}
.mpick-av{width:20px;height:20px;border-radius:50%;background:var(--b2);color:var(--gold);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mpick.sel .mpick-av{background:rgba(255,255,255,.2);color:#fff}
.chk-row{display:flex;align-items:center;gap:10px;padding:2px 0}
.chk-row input{width:20px;height:20px;accent-color:var(--b);flex-shrink:0}
.chk-row label{font-size:14px;font-weight:500;color:var(--text)}
.modal-actions{display:flex;gap:8px;padding:12px 18px 16px;border-top:1px solid var(--border);flex-shrink:0}
.btn-del{background:none;color:var(--red);border:1.5px solid var(--red);padding:11px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0}
.btn-del:active{background:var(--red-bg)}
.btn-cancel{background:var(--bg2);color:var(--text2);border:none;padding:11px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save{background:var(--b);color:#fff;border:none;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-left:auto;flex-shrink:0}
.btn-save:active{background:var(--b2)}

/* ── ADD SHEET ── */
.sheet-bg{position:fixed;inset:0;background:rgba(26,17,24,.5);z-index:300;display:none;backdrop-filter:blur(4px)}
.sheet-bg.on{display:block}
.add-sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-radius:20px 20px 0 0;
  z-index:301;display:none;
  padding:10px 16px calc(16px + var(--safe-bottom));
}
.add-sheet.on{display:block}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sopt{background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:15px 14px;cursor:pointer;display:flex;flex-direction:column;gap:4px}
.sopt:active{border-color:var(--b);background:var(--card);transform:scale(.97)}
.sopt-ico{font-size:24px}
.sopt-lbl{font-size:14px;font-weight:700;color:var(--text)}
.sopt-desc{font-size:11px;color:var(--text3)}

/* ── PASSWORD GATE ── */
#pw-gate{position:fixed;inset:0;background:var(--b3);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
#pw-gate.hidden{display:none}
.pw-box{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:320px}
.pw-logo-wrap{width:80px;height:80px;background:rgba(255,255,255,.07);border-radius:24px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.1)}
.pw-title{font-family:'Playfair Display',serif;font-size:22px;color:#F0E6D0;font-weight:500;text-align:center;line-height:1.3}
.pw-sub{font-size:13px;color:rgba(240,230,208,.4);text-align:center;margin-top:-12px}
.pw-field{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:14px 18px;font-family:'Inter',sans-serif;font-size:16px;color:#F0E6D0;outline:none;text-align:center;letter-spacing:4px;-webkit-appearance:none}
.pw-field::placeholder{letter-spacing:0;font-size:14px;color:rgba(240,230,208,.3)}
.pw-field:focus{border-color:var(--gold)}
.pw-btn{width:100%;background:var(--gold);color:var(--b3);border:none;border-radius:12px;padding:14px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.pw-btn:active{background:var(--gold2);transform:scale(.97)}
.pw-err{font-size:12px;color:#FF8A80;text-align:center;min-height:18px}

/* ── DB LOADING ── */
#db-load{position:fixed;inset:0;background:var(--b3);display:flex;align-items:center;justify-content:center;z-index:998;flex-direction:column;gap:14px}
#db-load.hidden{display:none}
.db-spin{width:32px;height:32px;border:3px solid rgba(201,169,110,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.db-txt{font-size:13px;color:rgba(240,230,208,.4);font-family:'Inter',sans-serif}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.25}
.empty-txt{font-size:14px;font-weight:500}

/* ── DESKTOP ADJUSTMENTS ── */
@media(min-width:640px){

    position:static;height:100vh;width:70px;

  .page-container{flex:1;display:flex;flex-direction:column;overflow:hidden}

  .modal-handle{display:none}

  .sheet-handle{display:none}
  .kanban{align-items:flex-start}
  .kb-col{width:260px}
}
</style>

// ── CALENDAR ────────────────────────────────────────────────
function calHTML(){
  const y=calDate.getFullYear(),mi=calDate.getMonth();
  const lbl=calView==='week'?wkLbl():`${M[mi]} ${y}`;
  const pills=['agenda','month','week'].map(v=>`<button class="pill${calView===v?' active':''}" onclick="setV('${v}')">${v[0].toUpperCase()+v.slice(1)}</button>`).join('');
  const nav=`<div class="cal-nav"><button class="cal-nav-btn" onclick="calNav(-1)">‹</button><span class="cal-nav-lbl">${lbl}</span><button class="today-pill" onclick="goToday()">Today</button><button class="cal-nav-btn" onclick="calNav(1)">›</button></div>`;
  const piBar=`<div class="pills">${pills}</div>`;
  const body=calView==='agenda'?agHTML():calView==='month'?moHTML():wkHTML();
  return`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">${nav}${piBar}<div class="scroll pad">${body}</div></div>`;
}
function wkLbl(){const s=new Date(calDate);s.setDate(s.getDate()-s.getDay());const e=new Date(s);e.setDate(e.getDate()+6);return`${s.getDate()} ${MS[s.getMonth()]} – ${e.getDate()} ${MS[e.getMonth()]}`}
function agHTML(){
  const today=new Date(),end=new Date(calDate.getFullYear(),calDate.getMonth()+3,0);
  let bm={};let d=new Date(calDate.getFullYear(),calDate.getMonth(),1);
  while(d<=end){const ds=dstr(d.getFullYear(),d.getMonth(),d.getDate()),evs=evOn(ds);if(evs.length){const k=d.getFullYear()+'-'+d.getMonth();if(!bm[k])bm[k]={lbl:M[d.getMonth()]+' '+d.getFullYear(),days:[]};bm[k].days.push({d:new Date(d),ds,evs})}d.setDate(d.getDate()+1)}
  if(!Object.keys(bm).length)return'<div class="empty"><div class="empty-ico">📅</div><div class="empty-txt">No events</div></div>';
  return Object.values(bm).map(mo=>'<div class="ag-section"><div class="ag-month">'+mo.lbl+'</div>'+mo.days.map(day=>{
    const isT=today.toDateString()===day.d.toDateString();
    return'<div class="ag-day"><div class="ag-date-col'+(isT?' tod':'')+'"><div class="ag-num">'+day.d.getDate()+'</div><div class="ag-dayname">'+D[day.d.getDay()].slice(0,3)+'</div></div><div class="ag-events-col">'+day.evs.map(e=>{
      const t=tc(e.type),fr=parseFloat(e.fTarget)||0,ra=parseFloat(e.fRaised)||0,pct=fr>0?Math.min(100,ra/fr*100):0;
      return'<div class="ag-card" onclick="openEv(\''+e.id+'\')"><div class="ag-color" style="background:'+t.c+'"></div><div class="ag-content"><div class="ag-title">'+e.title+'</div><div class="ag-meta"><span class="ag-tag" style="background:'+t.bg+';color:'+t.c+'">'+t.l+'</span>'+(e.place?'<span class="ag-place">📍 '+e.place+'</span>':'')+'</div>'+(e.next?'<div class="ag-next" style="border-left-color:'+t.c+'"><div class="ag-next-lbl" style="color:'+t.c+'">Next steps</div>'+e.next+'</div>':'')+(fr>0?'<div class="ag-fr"><div class="ag-fr-row"><span>Fundraising</span><span class="ag-fr-val">R'+ra.toLocaleString()+' / R'+fr.toLocaleString()+'</span></div><div class="ag-fr-track"><div class="ag-fr-fill" style="width:'+pct+'%"></div></div></div>':'')+'</div>'+(e.members&&e.members.length?'<div class="ag-avs">'+e.members.slice(0,3).map(id=>avH(id)).join('')+'</div>':'')+'</div>';
    }).join('')+'</div></div>';
  }).join('')+'</div>').join('');
}
function moHTML(){
  const y=calDate.getFullYear(),mi=calDate.getMonth(),first=new Date(y,mi,1).getDay(),dim=new Date(y,mi+1,0).getDate(),today=new Date();
  let h='<div class="month-grid">'+D.map(d=>'<div class="dh">'+d[0]+'</div>').join('');
  for(let i=0;i<first;i++)h+='<div class="dc om"></div>';
  for(let d=1;d<=dim;d++){const ds=dstr(y,mi,d),evs=evOn(ds),isT=today.getFullYear()===y&&today.getMonth()===mi&&today.getDate()===d;h+='<div class="dc'+(isT?' tod':'')+'" onclick="dayClick(\''+ds+'\')"><div class="dn">'+d+'</div>'+evs.slice(0,2).map(e=>{const t=tc(e.type);return'<div class="ec" style="background:'+t.bg+';color:'+t.c+'">'+e.title+'</div>'}).join('')+(evs.length>2?'<div class="ec-more">+'+( evs.length-2)+'</div>':'')+'</div>';}
  return h+'</div>';
}
function wkHTML(){
  const s=new Date(calDate);s.setDate(s.getDate()-s.getDay());const today=new Date();
  let h='<div class="wk-grid">';
  for(let i=0;i<7;i++){const d=new Date(s);d.setDate(d.getDate()+i);const ds=dstr(d.getFullYear(),d.getMonth(),d.getDate()),evs=evOn(ds),isT=today.toDateString()===d.toDateString();h+='<div class="wk-col'+(isT?' tod':'')+'"><div class="wk-hd"><div class="wk-dn">'+D[i].slice(0,3)+'</div><div class="wk-dd">'+d.getDate()+'</div></div><div class="wk-evts">'+evs.map(e=>{const t=tc(e.type);return'<div class="wk-chip" style="background:'+t.bg+';color:'+t.c+'" onclick="openEv(\''+e.id+'\')">'+e.title+'</div>'}).join('')+'<button class="wk-add-btn" onclick="newOnDate(\''+ds+'\')">+</button></div></div>';}
  return h+'</div>';
}

function tasksHTML(){
  const pills=['all','todo','prog','done','high'].map(f=>{const lbs={all:'All',todo:'To Do',prog:'In Progress',done:'Done',high:'High Priority'};return`<button class="pill${taskFilter===f?' active':''}" onclick="setTF('${f}')">${lbs[f]}</button>`}).join('');
  let fil=tasks;
  if(taskFilter==='todo')fil=tasks.filter(t=>t.status==='todo');
  else if(taskFilter==='prog')fil=tasks.filter(t=>t.status==='prog');
  else if(taskFilter==='done')fil=tasks.filter(t=>t.status==='done');
  else if(taskFilter==='high')fil=tasks.filter(t=>t.priority==='high');
  const todo=fil.filter(t=>t.status==='todo'),prog=fil.filter(t=>t.status==='prog'),done=fil.filter(t=>t.status==='done');
  const card=t=>{const p=PRI[t.priority]||PRI.mid,ev=t.eventId?evById(t.eventId):null,od=isOD(t.due)&&t.status!=='done';return'<div class="task-card" onclick="openTask(\''+t.id+'\')"><div class="task-avs">'+(t.members||[]).slice(0,3).map(id=>avH(id,20)).join('')+'</div><div class="task-title">'+t.title+'</div><div class="task-meta"><span class="task-pri '+p.cls+'">'+p.l+'</span>'+(t.due?'<span class="task-due'+(od?' od':'')+'">📅 '+fmtD(t.due)+(od?' · Overdue':'')+'</span>':'')+'</div>'+(ev?'<div class="task-ev">🔗 '+ev.title+'</div>':'')+(t.notes?'<div class="task-notes">'+t.notes+'</div>':'')+'</div>'};
  const col=(items,status,cls)=>'<div class="kb-col '+cls+'"><div class="kb-hd"><span class="kb-title">'+STA[status].l+'</span><span class="kb-cnt">'+items.length+'</span></div><div class="kb-cards"><button class="kb-add-btn" onclick="newTaskWithStatus(\''+status+'\')">＋ Add task</button>'+(items.length?items.map(card).join(''):'<div style="text-align:center;padding:16px;font-size:11px;color:var(--text3)">Empty</div>')+'</div></div>';
  return'<div class="kanban-body"><div class="pills">'+pills+'</div><div class="kanban">'+col(todo,'todo','kb-todo')+col(prog,'prog','kb-prog')+col(done,'done','kb-done')+'</div></div>';
}

  const up=events.filter(e=>e.isMtg&&e.date>=now).sort((a,b)=>a.date.localeCompare(b.date));

  const card=e=>{const[y,m,d]=e.date.split('-'),t=tc(e.type),dd=new Date(parseInt(y),parseInt(m)-1,parseInt(d));return'<div class="mtg-card" onclick="openEv(\''+e.id+'\')"><div class="mtg-date-block"><div class="mtg-day">'+D[dd.getDay()].slice(0,3)+'</div><div class="mtg-num">'+parseInt(d)+'</div><div class="mtg-mon">'+MS[parseInt(m)-1]+'</div></div><div class="mtg-body"><div class="mtg-title">'+e.title+'</div><div class="mtg-meta"><span class="ag-tag" style="background:'+t.bg+';color:'+t.c+'">'+t.l+'</span>'+(e.place?'<span class="mtg-place">📍 '+e.place+'</span>':'')+'</div>'+(e.next?'<div class="mtg-next-box"><div class="mtg-next-lbl">Next steps</div>'+e.next+'</div>':'')+(e.members&&e.members.length?'<div class="mtg-avs">'+e.members.map(id=>avH(id,26)).join('')+'</div>':'')+'</div></div>'};
  return'<div style="display:flex;flex-direction:column;height:100%;overflow:hidden"><div class="page-hdr"><span class="page-title">Meetings</span></div><div class="scroll pad">'+(up.length?'<div class="sec-lbl">Upcoming</div>'+up.map(card).join(''):'')+(pa.length?'<div class="sec-lbl" style="margin-top:16px;opacity:.6">Past</div><div style="opacity:.5">'+pa.map(card).join('')+'</div>':'')+((!events.filter(e=>e.isMtg).length)?'<div class="empty"><div class="empty-ico">🤝</div><div class="empty-txt">No meetings yet</div></div>':'')+'</div></div>';

// ── FUNDRAISING ───────────────────────────────────────────────
function frHTML(){
  const frs=events.filter(e=>(parseFloat(e.fTarget)||0)>0);
  let tt=0,tr=0;frs.forEach(e=>{tt+=parseFloat(e.fTarget)||0;tr+=parseFloat(e.fRaised)||0});
  const pct=tt>0?Math.min(100,tr/tt*100):0;
  const ico={fundraiser:'🎪',special:'⭐',retreat:'🏔',meeting:'🤝',mass:'⛪',worship:'🎶'};
  return'<div style="display:flex;flex-direction:column;height:100%;overflow:hidden"><div class="page-hdr"><span class="page-title">Fundraising</span></div><div class="scroll pad"><div class="fr-hero"><div class="fr-hero-lbl">Total Raised</div><div class="fr-hero-total"><small>R</small>'+tr.toLocaleString()+'</div><div class="fr-hero-sub">of R'+tt.toLocaleString()+' target — '+pct.toFixed(0)+'% achieved</div><div class="fr-hero-bar"><div class="fr-hero-fill" style="width:'+pct+'%"></div></div><div class="fr-stats"><div class="fr-stat"><div class="fr-sv">R'+(tt-tr).toLocaleString()+'</div><div class="fr-sl">Remaining</div></div><div class="fr-stat"><div class="fr-sv">'+frs.length+'</div><div class="fr-sl">Projects</div></div><div class="fr-stat"><div class="fr-sv">'+pct.toFixed(0)+'%</div><div class="fr-sl">Complete</div></div></div></div><div class="fr-sec-lbl">Active Projects</div>'+(frs.length?frs.map(e=>{const tgt=parseFloat(e.fTarget)||0,rsd=parseFloat(e.fRaised)||0,p=tgt>0?Math.min(100,rsd/tgt*100):0;return'<div class="fr-card" onclick="openEv(\''+e.id+'\')"><div class="fr-card-top"><div class="fr-card-ico">'+(ico[e.type]||'💰')+'</div><div class="fr-card-info"><div class="fr-card-title">'+e.title+'</div><div class="fr-card-date">📅 '+fmtD(e.date)+(e.place?' · 📍 '+e.place:'')+'</div></div><div class="fr-card-amt"><div class="fr-card-raised">R'+rsd.toLocaleString()+'</div><div class="fr-card-target">of R'+tgt.toLocaleString()+'</div></div></div><div class="fr-card-bar"><div class="fr-card-fill" style="width:'+p+'%"></div></div><div class="fr-card-foot"><div class="fr-card-pct">'+p.toFixed(0)+'% raised</div>'+(e.members&&e.members.length?'<div style="display:flex">'+e.members.map(id=>avH(id,22)).join('')+'</div>':'')+'</div></div>'}).join(''):'<div class="empty"><div class="empty-ico">💰</div><div class="empty-txt">No projects yet</div></div>')+'</div></div>';
}

// ── MEN ───────────────────────────────────────────────────────
function menHTML(){
  const today=new Date();

  const bdays=members.map(m=>{if(!m.dob)return null;const[y,mo,d]=m.dob.split('-').map(Number);let bd=new Date(today.getFullYear(),mo-1,d);if(bd<today)bd=new Date(today.getFullYear()+1,mo-1,d);return{...m,bd,diff:Math.ceil((bd-today)/864e5)}}).filter(Boolean).sort((a,b)=>a.diff-b.diff).slice(0,7);
  const listR=m=>{
    const a=age(m.dob),mt=tasksForMem(m.id),hi=mt.filter(t=>t.priority==='high'&&t.status!=='done').length,op=mt.filter(t=>t.status!=='done').length;

  };

  return'<div style="display:flex;flex-direction:column;height:100%;overflow:hidden"><div class="page-hdr"><span class="page-title">Men <span style="font-size:13px;font-weight:400;color:var(--text3)">'+members.length+'</span></span><div class="view-toggle"><button class="vt'+(memView==='list'?' active':'')+'" onclick="memView=\'list\';render()">☰</button><button class="vt'+(memView==='tile'?' active':'')+'" onclick="memView=\'tile\';render()">⊞</button></div></div><div style="padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)"><div class="search-bar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Search men..." value="'+memSearch+'" oninput="memSearch=this.value;render()"></div></div><div class="scroll pad"><div class="bday-strip">'+bdays.map(m=>'<div class="bday-card"><div class="bday-name">'+m.name.split(' ')[0]+'</div><div class="bday-dt">'+m.bd.getDate()+' '+MS[m.bd.getMonth()]+'</div><div class="bday-n">'+m.diff+'</div><div class="bday-nl">days</div></div>').join('')+'</div><div class="'+(memView==='tile'?'mem-tiles':'mem-list')+'">'+fil.map(memView==='tile'?tileR:listR).join('')+(fil.length===0?'<div class="empty"><div class="empty-ico">👥</div><div class="empty-txt">No men found</div></div>':'')+'</div></div></div>';

window.saveEv=async()=>{

  if(editEv){Object.assign(editEv,data);if(window._dbReady)try{const{doc:d,updateDoc:u}=window._fb;const{id,...dd}=editEv;await u(d(window._db,'events',id),dd)}catch(e){}}
  else{const id=uid();events.push({id,...data});if(window._dbReady)try{const{collection:col,addDoc:add}=window._fb;await add(col(window._db,'events'),{id,...data})}catch(e){}}

window.delEv=async id=>{if(!confirm('Delete this event?'))return;if(window._dbReady)try{const{doc:d,deleteDoc:del}=window._fb;await del(d(window._db,'events',id))}catch(e){}events=events.filter(e=>e.id!==id);closeMod('ev-modal');render()};

// ── PASSWORD ─────────────────────────────────────────────────
const PWD='1925';
window.checkPw=()=>{
  const v=document.getElementById('pw-in').value;

// ── FIREBASE BOOT ─────────────────────────────────────────────
async function boot(){
  document.getElementById('db-load').classList.remove('hidden');
  try{
    if(!window._dbReady)await new Promise(res=>window.addEventListener('dbready',res,{once:true}));
    const{collection:col,getDocs,addDoc:add}=window._fb;const db=window._db;
    const[es,ts,ms]=await Promise.all([getDocs(col(db,'events')),getDocs(col(db,'tasks')),getDocs(col(db,'members'))]);
    if(!es.empty)events=es.docs.map(d=>({id:d.id,...d.data()}));
    else for(const e of events){const{id,...d}=e;await add(col(db,'events'),{id,...d})}
    if(!ts.empty)tasks=ts.docs.map(d=>({id:d.id,...d.data()}));
    else for(const t of tasks){const{id,...d}=t;await add(col(db,'tasks'),{id,...d})}
    if(!ms.empty)members=ms.docs.map(d=>({id:d.id,...d.data()}));
    else for(const m of members){const{id,...d}=m;await add(col(db,'members'),{id,...d})}
  }catch(e){console.warn('Firebase unavailable, running offline',e)}
  document.getElementById('db-load').classList.add('hidden');
  render();
}

if(sessionStorage.getItem('cmm_auth')==='1'){document.getElementById('pw-gate').classList.add('hidden');boot();}
else setTimeout(()=>document.getElementById('pw-in').focus(),300);
</script>
